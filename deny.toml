[advisories]
unmaintained = "workspace"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "0BSD",
    "CDLA-Permissive-2.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace test crate uses path deps without version specifiers (publish = false)
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
