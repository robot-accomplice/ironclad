  <style>
    :root, [data-theme="ai-purple"] {

      --accent: #00ff41;

      --success: #00ff41;
      --warning: #99ff33;
      --error: #ff3333;
      --crt-scanline: rgba(0,0,0,0.12);

    }
    [data-theme="psychedelic"] {
      --bg: #0a0012;

      --accent: #ff00ff;

      --warning: #ffff00;

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    .layout { display: flex; width: 100%; height: 100%; }

    .sidebar.collapsed .sidebar-header { padding: 0.75rem; justify-content: center; align-items: center; gap: 0; }
    .sidebar-brand { display: flex; flex-direction: column; overflow: hidden; transition: width 0.2s, opacity 0.2s; }
    .sidebar.collapsed .sidebar-brand { opacity: 0; width: 0; overflow: hidden; margin: 0; padding: 0; }
    .sidebar-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.25rem; letter-spacing: 0.15em; text-transform: uppercase; }

    .sidebar.collapsed .agent-badge { display: none; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; animation: statusPulse 2s ease-in-out infinite; }
    .status-dot.warning { background: var(--warning); animation: none; }
    .status-dot.error { background: var(--error); animation: none; }
    @keyframes statusPulse { 0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 50% { opacity: 0.7; box-shadow: 0 0 6px 2px rgba(34,197,94,0.3); } }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 0.75rem 0; }

    .sidebar.collapsed .sidebar-nav a { justify-content: center; padding: 0.625rem 0; }

      display: flex; align-items: center; justify-content: center; gap: 0.5rem;

    .demo-badge { font-size: 0.6875rem; padding: 0.25rem 0.625rem; background: rgba(234,179,8,0.15); color: var(--warning); border: 1px solid rgba(234,179,8,0.3); border-radius: 3px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
    .connection-status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--muted); }
    .connection-status .ws-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; animation: statusPulse 2s ease-in-out infinite; }
    .connection-status .ws-dot.off { background: var(--error); animation: none; }
    .content { flex: 1; overflow: auto; padding: 1.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); transition: transform 0.15s, box-shadow 0.15s; }
    .card:hover { transform: translateY(-1px); box-shadow: 0 8px 15px -3px rgba(0,0,0,0.35); }
    .card-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.5rem; }
    .card-value { font-size: 1.25rem; font-weight: 600; }
    .card-mono { font-family: var(--font-mono); font-size: 0.8125rem; }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 3px; font-size: 0.75rem; font-weight: 500; }
    .badge.success { background: rgba(34, 197, 94, 0.2); color: var(--success); }

    .badge.warning { background: rgba(234, 179, 8, 0.2); color: var(--warning); }
    .badge.muted { background: rgba(113, 113, 122, 0.2); color: var(--muted); }

    .cc-chart { width: 100%; height: 64px; display: block; margin-top: 0.5rem; }
    .cc-footer { display: flex; gap: 1rem; padding: 0.625rem 1.25rem; border-top: 1px solid var(--border); background: rgba(0,0,0,0.15); }
    .cc-stat { display: flex; flex-direction: column; }
    .cc-stat-label { font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .cc-stat-value { font-size: 0.8125rem; font-weight: 600; font-family: var(--font-mono); }
    .cc-agents-row { display: flex; gap: 0.5rem; flex-wrap: wrap; padding: 0.75rem 1.25rem 1rem; }
    .cc-agent-pill { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.3rem 0.625rem; border-radius: 3px; font-size: 0.75rem; background: rgba(255,255,255,0.04); border: 1px solid var(--border); }
    .cc-agent-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--surface); color: var(--muted); font-weight: 500; position: sticky; top: 0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .tabs { display: flex; gap: 0.25rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .tabs button { padding: 0.5rem 1rem; background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); font-size: 0.875rem; cursor: pointer; transition: all 0.15s; }
    .tabs button:hover { color: var(--text); }
    .tabs button.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: var(--accent); color: white; border: none; border-radius: 4px; font-size: 0.875rem; font-family: var(--font); cursor: pointer; transition: background 0.15s, transform 0.1s; text-transform: uppercase; letter-spacing: 0.04em; }
    .btn:hover { background: #5558e3; transform: translateY(-1px); }
    .btn.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn.secondary:hover { background: var(--border); }
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .skill-card { cursor: default; }
    .skill-card .card-value { font-size: 1rem; }
    .skill-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; }
    .skill-info { flex: 1; min-width: 0; }
    .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; margin-top: 2px; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 11px; cursor: pointer; transition: background 0.2s; }
    .toggle-track::after { content: ''; position: absolute; left: 3px; top: 3px; width: 16px; height: 16px; background: var(--muted); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
    .toggle input:checked + .toggle-track { background: rgba(34,197,94,0.3); }
    .toggle input:checked + .toggle-track::after { transform: translateX(18px); background: var(--success); }
    .message-thread { max-height: 320px; overflow-y: auto; }
    .message { margin-bottom: 1rem; padding: 0.75rem 1rem; border-radius: 3px; max-width: 85%; }
    .message.user { margin-left: auto; background: var(--accent-dim); border: 1px solid rgba(99,102,241,0.3); }
    .message.assistant { margin-right: auto; background: var(--surface); border: 1px solid var(--border); }
    .message-role { font-size: 0.7rem; text-transform: uppercase; color: var(--muted); margin-bottom: 0.25rem; }
    .config-block { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1rem; font-family: var(--font-mono); font-size: 0.8125rem; overflow-x: auto; margin-bottom: 0.5rem; white-space: pre-wrap; word-break: break-word; }
    .config-section { margin-bottom: 1rem; }
    .config-section summary { cursor: pointer; padding: 0.5rem 0; color: var(--accent); }
    .chart-bars { display: flex; align-items: flex-end; gap: 4px; height: 120px; margin-top: 0.5rem; }
    .chart-bar { flex: 1; min-width: 8px; background: linear-gradient(180deg, var(--accent) 0%, rgba(99,102,241,0.4) 100%); border-radius: 4px 4px 0 0; transition: height 0.3s; }
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 1000; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { padding: 0.75rem 1.25rem; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; box-shadow: var(--shadow); font-size: 0.875rem; animation: toastIn 0.25s ease; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 0.5rem; z-index: 100; }

    .settings-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }

    .settings-editor { position: relative; }

      width: 100%; min-height: 360px; padding: 1rem; background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px; font-family: var(--font-mono); font-size: 0.8125rem;
      line-height: 1.6; resize: vertical; tab-size: 2; outline: none; transition: border-color 0.15s;
    }
    .settings-editor textarea:focus { border-color: var(--accent); }
    .settings-editor textarea.has-error { border-color: var(--error); }
    .settings-lint { font-size: 0.75rem; margin-top: 0.375rem; min-height: 1.25rem; font-family: var(--font-mono); }
    .settings-lint.ok { color: var(--success); }
    .settings-lint.err { color: var(--error); }
    .settings-form { display: flex; flex-direction: column; gap: 1.25rem; }

    .settings-section-title { font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 0.75rem; font-weight: 600; }

    .settings-row:last-child { margin-bottom: 0; }

    .settings-input {
      padding: 0.375rem 0.625rem; background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 3px; font-family: var(--font-mono); font-size: 0.8125rem;
      outline: none; transition: border-color 0.15s; width: 100%;
    }
    .settings-input:focus { border-color: var(--accent); }
    .settings-input[type="number"] { max-width: 120px; }

    .settings-toggle-label { font-size: 0.75rem; color: var(--muted); }

    .metrics-legend-val { color: var(--muted); font-family: var(--font-mono); }

    .metrics-stat-label { font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .metrics-stat-value { font-size: 1rem; font-weight: 700; margin-top: 0.125rem; font-family: var(--font-mono); }
    .cal-wrap { display: flex; flex-direction: column; height: 100%; min-height: 0; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; flex-shrink: 0; }
    .cal-header-left { display: flex; align-items: center; gap: 1rem; }
    .cal-title { font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
    .cal-nav { display: flex; gap: 0.25rem; }
    .cal-nav button { width: 28px; height: 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; color: var(--muted); font-size: 0.875rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.15s, border-color 0.15s; font-family: var(--font); }

  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

  // ── Sparkline / Area Chart Renderer ───────────────────────

  var sparklineId = 0;
  function renderSparkCanvas(series, opts) {
    opts = opts || {};
    var id = 'spark-' + (++sparklineId);
    var color = opts.color || '#6366f1';
    var fillFrom = opts.fillFrom != null ? opts.fillFrom : 0.25;
    var lineWidth = opts.lineWidth || 2;
    var height = opts.height || 64;

    setTimeout(function() {
      var canvas = document.getElementById(id);
      if (!canvas) return;
      var dpr = window.devicePixelRatio || 1;
      var rect = canvas.parentElement ? canvas.parentElement.getBoundingClientRect() : { width: 340 };
      var W = rect.width;
      var H = height;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      var ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      var min = Math.min.apply(null, series);
      var max = Math.max.apply(null, series);
      var range = max - min || 1;
      var padTop = 6, padBot = 4;
      var usableH = H - padTop - padBot;

      function toX(i) { return (i / (series.length - 1)) * W; }
      function toY(v) { return padTop + usableH - ((v - min) / range) * usableH; }

      // Gradient fill
      var grad = ctx.createLinearGradient(0, padTop, 0, H);
      grad.addColorStop(0, color + Math.round(fillFrom * 255).toString(16).padStart(2, '0'));
      grad.addColorStop(1, color + '00');

      ctx.beginPath();
      ctx.moveTo(toX(0), H);
      for (var i = 0; i < series.length; i++) {
        if (i === 0) ctx.lineTo(toX(0), toY(series[0]));
        else {
          var cx1 = (toX(i - 1) + toX(i)) / 2, cy1 = toY(series[i - 1]);
          var cx2 = (toX(i - 1) + toX(i)) / 2, cy2 = toY(series[i]);
          ctx.bezierCurveTo(cx1, cy1, cx2, cy2, toX(i), toY(series[i]));
        }
      }
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Line
      ctx.beginPath();
      for (var i = 0; i < series.length; i++) {
        if (i === 0) ctx.moveTo(toX(0), toY(series[0]));
        else {
          var cx1 = (toX(i - 1) + toX(i)) / 2, cy1 = toY(series[i - 1]);
          var cx2 = (toX(i - 1) + toX(i)) / 2, cy2 = toY(series[i]);
          ctx.bezierCurveTo(cx1, cy1, cx2, cy2, toX(i), toY(series[i]));
        }
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.stroke();

      // End dot
      var lastX = toX(series.length - 1), lastY = toY(series[series.length - 1]);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(lastX, lastY, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0a0b0f';
      ctx.beginPath();
      ctx.arc(lastX, lastY, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }, 0);

    return '<canvas id="' + id + '" class="cc-chart"></canvas>';
  }

  // ── Stacked Area Chart Renderer ────────────────────────────

  var stackedId = 0;
  function renderStackedArea(seriesMap, keys, colors, opts) {
    opts = opts || {};
    var id = 'stacked-' + (++stackedId);
    var height = opts.height || 180;
    var showLabels = opts.labels !== false;

    setTimeout(function() {
      var canvas = document.getElementById(id);
      if (!canvas) return;
      var dpr = window.devicePixelRatio || 1;
      var rect = canvas.parentElement ? canvas.parentElement.getBoundingClientRect() : { width: 600 };
      var W = rect.width;
      var H = height;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      var ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      var len = seriesMap[keys[0]].length;
      var padTop = 8, padBot = showLabels ? 22 : 6, padLeft = opts.yAxis ? 48 : 6, padRight = 20;
      var chartW = W - padLeft - padRight;
      var chartH = H - padTop - padBot;

      // Compute stacked totals
      var stacked = [];
      for (var i = 0; i < len; i++) {
        var cum = 0;
        var layers = [];
        for (var k = 0; k < keys.length; k++) {
          var val = seriesMap[keys[k]][i];
          layers.push({ bottom: cum, top: cum + val, key: keys[k] });
          cum += val;
        }
        stacked.push({ layers: layers, total: cum });
      }

      var maxTotal = Math.max.apply(null, stacked.map(function(s) { return s.total; }));
      if (maxTotal === 0) maxTotal = 1;

      function toX(i) { return padLeft + (i / (len - 1)) * chartW; }
      function toY(v) { return padTop + chartH - (v / maxTotal) * chartH; }

      // Draw stacked areas (bottom to top)
      for (var k = keys.length - 1; k >= 0; k--) {
        var color = colors[keys[k]] || '#71717a';

        // Fill
        var grad = ctx.createLinearGradient(0, padTop, 0, H - padBot);
        grad.addColorStop(0, color + '55');
        grad.addColorStop(1, color + '08');

        ctx.beginPath();
        ctx.moveTo(toX(0), toY(0));
        for (var i = 0; i < len; i++) {
          var topVal = stacked[i].layers[k].top;
          if (i === 0) ctx.lineTo(toX(0), toY(topVal));
          else {
            var cx1 = (toX(i - 1) + toX(i)) / 2;
            var prevTop = stacked[i - 1].layers[k].top;
            ctx.bezierCurveTo(cx1, toY(prevTop), cx1, toY(topVal), toX(i), toY(topVal));
          }
        }
        ctx.lineTo(toX(len - 1), toY(0));
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // Line on top edge
        ctx.beginPath();
        for (var i = 0; i < len; i++) {
          var topVal = stacked[i].layers[k].top;
          if (i === 0) ctx.moveTo(toX(0), toY(topVal));
          else {
            var cx1 = (toX(i - 1) + toX(i)) / 2;
            var prevTop = stacked[i - 1].layers[k].top;
            ctx.bezierCurveTo(cx1, toY(prevTop), cx1, toY(topVal), toX(i), toY(topVal));
          }
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      // Y-axis labels
      if (opts.yAxis) {
        ctx.fillStyle = '#71717a';
        ctx.font = '9px "JetBrains Mono", monospace';
        ctx.textAlign = 'right';
        var steps = 4;
        for (var s = 0; s <= steps; s++) {
          var val = (maxTotal / steps) * s;
          var y = toY(val);
          ctx.fillText(opts.yFormat ? opts.yFormat(val) : val.toFixed(2), padLeft - 6, y + 3);
          if (s > 0 && s < steps) {
            ctx.strokeStyle = 'rgba(113,113,122,0.1)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(padLeft, y);
            ctx.lineTo(W - padRight, y);
            ctx.stroke();
          }
        }
      }

      // X-axis labels
      if (showLabels) {
        ctx.fillStyle = '#71717a';
        ctx.font = '9px "JetBrains Mono", monospace';
        ctx.textAlign = 'center';
        var labelStep = Math.max(1, Math.floor(len / 6));
        for (var i = 0; i < len; i += labelStep) {
          var label = opts.xLabels ? opts.xLabels[i] : (i + 'h');
          ctx.fillText(label, toX(i), H - 4);
        }
      }
    }, 0);

    return '<canvas id="' + id + '" style="width:100%;height:' + height + 'px;display:block"></canvas>';
  }

        '<div class="cc-header"><div class="cc-left"><div class="cc-label">System Health</div><div class="cc-value"><span class="badge success">healthy</span></div><div class="cc-sub">uptime 4h 7m 12s</div></div>' +
        '<div class="cc-right"><span class="cc-delta up">99.6% cron</span></div></div>' +

        '<div class="cc-footer"><div class="cc-stat"><div class="cc-stat-label">Breaker</div><div class="cc-stat-value"><span class="badge success" style="font-size:0.6875rem">closed</span></div></div>' +
        '<div class="cc-stat"><div class="cc-stat-label">Failures (24h)</div><div class="cc-stat-value">' + TIMESERIES.breakerFailures.reduce(function(a,b){return a+b},0) + '</div></div>' +
        '<div class="cc-stat"><div class="cc-stat-label">Cron errors</div><div class="cc-stat-value">' + MOCK.cronJobs.reduce(function(a,j){return a+j.consecutive_errors},0) + '</div></div></div></div>';

      // 9. Active Agents (wider, stacked area chart)
      var fleetAgents = MOCK.workspaceState.agents;
      var fleetKeys = fleetAgents.map(function(a) { return a.name; });
      var fleetColors = {};
      fleetAgents.forEach(function(a) { fleetColors[a.name] = a.color; });

      var fleetLegend = fleetAgents.map(function(a) {
        var stDot = a.state === 'Running' ? 'var(--success)' : a.state === 'Error' ? 'var(--error)' : 'var(--warning)';
        var lastVal = TIMESERIES.agentLoadByAgent[a.name] ? seriesLast(TIMESERIES.agentLoadByAgent[a.name]) : 0;
        return '<div class="metrics-legend-item"><div class="metrics-legend-dot" style="background:' + a.color + '"></div>' + esc(a.name) +
          '<span class="metrics-legend-val" style="margin-left:auto">' + (lastVal * 100).toFixed(0) + '%</span>' +
          '<div style="width:6px;height:6px;border-radius:50%;background:' + stDot + ';flex-shrink:0"></div></div>';
      }).join('');

      cards += '<div class="card composite-card" style="grid-column: 1 / -1">' +
        '<div class="cc-header"><div class="cc-left"><div class="cc-label">Agent Fleet</div><div class="cc-value">' + agentRunning.length + ' / ' + fleetAgents.length + ' running</div><div class="cc-sub">avg load ' + (seriesLast(TIMESERIES.agentLoad) * 100).toFixed(0) + '%</div></div>' +
        '<div class="cc-right">' + deltaHtml(seriesLast(TIMESERIES.agentLoad), seriesPrev(TIMESERIES.agentLoad)) + '</div></div>' +

        }) +
        '<div class="metrics-legend" style="padding:0.5rem 1rem 0.75rem">' + fleetLegend + '</div></div>';

      return '<div class="overview-grid">' + cards + '</div>';

      }

    },
    _calMonth: new Date().getMonth(),
    _calYear: new Date().getFullYear(),
    _calSelected: null,
    _calEditJob: null,
    _calModalMode: null,
    _JOB_COLORS: ['#6366f1','#22c55e','#06b6d4','#f59e0b','#ec4899','#8b5cf6','#ef4444','#14b8a6','#f97316','#a855f7'],
    _parseCronToSched: function(kind, expr) {
      var s = { freq: 'daily', interval: 5, intervalUnit: 'minutes', hour: '02', minute: '00', days: [1,2,3,4,5,6,0] };
      if (kind === 'interval') {
        var m = expr.match(/^(\d+)(s|m|h)$/);
        if (m) {
          s.freq = 'interval';
          s.interval = parseInt(m[1]);
          s.intervalUnit = m[2] === 's' ? 'seconds' : m[2] === 'h' ? 'hours' : 'minutes';
        }
        return s;
      }
      var parts = (expr || '* * * * *').split(/\s+/);
      var min = parts[0] || '*', hr = parts[1] || '*';
      if (min.indexOf('/') !== -1) {
        s.freq = 'interval'; s.intervalUnit = 'minutes';
        s.interval = parseInt(min.split('/')[1]) || 5;
      } else if (hr.indexOf('/') !== -1) {
        s.freq = 'interval'; s.intervalUnit = 'hours';
        s.interval = parseInt(hr.split('/')[1]) || 1;
      } else if (hr !== '*' && min !== '*') {
        s.hour = String(parseInt(hr)).padStart(2, '0');
        s.minute = String(parseInt(min)).padStart(2, '0');
        var dow = parts[4] || '*';
        if (dow === '*') { s.freq = 'daily'; s.days = [0,1,2,3,4,5,6]; }
        else {
          s.freq = 'weekly';
          s.days = dow.split(',').map(function(d) { return parseInt(d); });
        }
      } else if (min !== '*') {
        s.freq = 'hourly'; s.minute = String(parseInt(min)).padStart(2, '0');
      } else {
        s.freq = 'interval'; s.interval = 1; s.intervalUnit = 'minutes';
      }
      return s;
    },
    _schedToCron: function(s) {
      if (s.freq === 'interval') {
        if (s.intervalUnit === 'seconds') return { kind: 'interval', expr: s.interval + 's' };
        if (s.intervalUnit === 'hours') return { kind: 'cron', expr: '0 */' + s.interval + ' * * *' };
        return { kind: 'cron', expr: '*/' + s.interval + ' * * * *' };
      }
      if (s.freq === 'hourly') return { kind: 'cron', expr: s.minute + ' * * * *' };
      if (s.freq === 'weekly') return { kind: 'cron', expr: s.minute + ' ' + s.hour + ' * * ' + s.days.join(',') };
      return { kind: 'cron', expr: s.minute + ' ' + s.hour + ' * * *' };
    },
    _readSchedFromUI: function() {
      var freqEl = document.getElementById('cal-sched-freq');
      var freq = freqEl ? freqEl.value : 'daily';
      var s = { freq: freq, interval: 5, intervalUnit: 'minutes', hour: '02', minute: '00', days: [0,1,2,3,4,5,6] };
      if (freq === 'interval') {
        var intEl = document.getElementById('cal-sched-interval');
        var unitEl = document.getElementById('cal-sched-interval-unit');
        s.interval = intEl ? parseInt(intEl.value) || 1 : 5;
        s.intervalUnit = unitEl ? unitEl.value : 'minutes';
      } else if (freq === 'hourly') {
        var minEl = document.getElementById('cal-sched-minute');
        s.minute = String(minEl ? parseInt(minEl.value) || 0 : 0).padStart(2, '0');
      } else {
        var hrEl = document.getElementById('cal-sched-hour');
        var minEl = document.getElementById('cal-sched-minute');
        s.hour = String(hrEl ? parseInt(hrEl.value) || 0 : 0).padStart(2, '0');
        s.minute = String(minEl ? parseInt(minEl.value) || 0 : 0).padStart(2, '0');
        if (freq === 'weekly') {
          s.days = [];
          document.querySelectorAll('.cal-day-btn.active').forEach(function(b) { s.days.push(parseInt(b.getAttribute('data-cal-day'))); });
          if (s.days.length === 0) s.days = [1];
        }
      }
      return s;
    },
    _schedSummary: function(s) {
      if (s.freq === 'interval') return 'Every ' + s.interval + ' ' + s.intervalUnit;
      if (s.freq === 'hourly') return 'Every hour at :' + s.minute;
      var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var time = s.hour + ':' + s.minute;
      if (s.freq === 'weekly') {
        var d = s.days.map(function(i) { return dayNames[i]; }).join(', ');
        return 'Weekly on ' + d + ' at ' + time;
      }
      return 'Daily at ' + time;
    },
    renderScheduler: function() {
      var self = this;
      var year = this._calYear;
      var month = this._calMonth;
      var now = new Date();
      var todayKey = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      var dows = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

      var firstDay = new Date(year, month, 1);
      var startDow = (firstDay.getDay() + 6) % 7;
      var daysInMonth = new Date(year, month + 1, 0).getDate();
      var prevDays = new Date(year, month, 0).getDate();

      var jobMap = {};
      MOCK.cronJobs.forEach(function(j) { jobMap[j.name] = j; });

      var calCells = '';
      var totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;
      for (var i = 0; i < totalCells; i++) {
        var dayNum, isOther = false, dateKey;
        if (i < startDow) {
          dayNum = prevDays - startDow + i + 1;
          isOther = true;
          var pm = month === 0 ? 12 : month;
          var py = month === 0 ? year - 1 : year;
          dateKey = py + '-' + String(pm).padStart(2, '0') + '-' + String(dayNum).padStart(2, '0');
        } else if (i >= startDow + daysInMonth) {
          dayNum = i - startDow - daysInMonth + 1;
          isOther = true;
          var nm = month + 2 > 12 ? 1 : month + 2;
          var ny = month + 2 > 12 ? year + 1 : year;
          dateKey = ny + '-' + String(nm).padStart(2, '0') + '-' + String(dayNum).padStart(2, '0');
        } else {
          dayNum = i - startDow + 1;
          dateKey = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(dayNum).padStart(2, '0');
        }

        var isToday = dateKey === todayKey;
        var isSelected = dateKey === self._calSelected;
        var cls = 'cal-day' + (isOther ? ' other-month' : '') + (isToday ? ' today' : '') + (isSelected ? ' selected' : '');

        var dayRuns = MOCK.cronRuns[dateKey] || [];
        var evtHtml = '';
        if (dayRuns.length > 0) {
          evtHtml = '<div class="cal-events">';
          dayRuns.forEach(function(r) {
            var job = jobMap[r.job];
            var color = job ? job.color : '#71717a';
            var failCls = r.status === 'error' ? ' fail' : '';
            evtHtml += '<div class="cal-evt' + failCls + '" style="background:' + color + '" title="' + esc(r.job) + ' (' + r.count + ' runs, ' + r.status + ')" data-evt-job="' + esc(r.job) + '" data-evt-date="' + dateKey + '">' + esc(r.job) + '</div>';
          });
          evtHtml += '</div>';
        }

        calCells += '<div class="' + cls + '" data-date="' + dateKey + '"><div class="cal-day-num">' + dayNum + '</div>' + evtHtml + '</div>';
      }

      var dowHeaders = dows.map(function(d) { return '<div class="cal-dow">' + d + '</div>'; }).join('');

      // Legend sidebar
      var legend = MOCK.cronJobs.map(function(j, idx) {
        var stBadge = j.last_status === 'success' ? '<span class="badge success" style="font-size:0.5625rem">ok</span>' : '<span class="badge error" style="font-size:0.5625rem">err</span>';
        return '<div class="cal-legend-item">' +
          '<div class="cal-legend-dot" style="background:' + j.color + '"></div>' +
          '<div class="cal-legend-info"><div class="cal-legend-name">' + esc(j.name) + '</div><div class="cal-legend-sched">' + esc(j.schedule_kind + ' ' + j.schedule_expr) + '</div></div>' +
          '<div class="cal-legend-actions">' + stBadge +
          '<button class="cal-legend-btn" data-cal-edit="' + idx + '" title="Edit">\u270e</button>' +
          '<button class="cal-legend-btn danger" data-cal-delete="' + idx + '" title="Delete">\u2715</button>' +
          '</div></div>';
      }).join('');

      // Day detail panel
      var detail = '';
      if (self._calSelected) {
        var selRuns = MOCK.cronRuns[self._calSelected] || [];
        if (selRuns.length > 0) {
          var runItems = selRuns.map(function(r) {
            var job = jobMap[r.job];
            var color = job ? job.color : '#71717a';
            var stCls = r.status === 'error' ? 'error' : 'success';
            return '<div class="cal-detail-run"><div class="cal-detail-dot" style="background:' + color + '"></div><span style="flex:1">' + esc(r.job) + '</span><span class="card-mono" style="color:var(--muted)">' + r.count + 'x</span><span class="badge ' + stCls + '" style="font-size:0.5625rem">' + r.status + '</span></div>';
          }).join('');
          detail = '<div class="cal-detail"><div class="cal-detail-title">' + esc(self._calSelected) + '</div>' + runItems + '</div>';
        } else {
          detail = '<div class="cal-detail"><div class="cal-detail-title">' + esc(self._calSelected) + '</div><div style="color:var(--muted);font-size:0.75rem">No runs on this day</div></div>';
        }
      }

      // Modal
      var modal = '';
      if (self._calModalMode) {
        var job = self._calEditJob || { name: '', schedule_kind: 'cron', schedule_expr: '', color: self._JOB_COLORS[MOCK.cronJobs.length % self._JOB_COLORS.length] };
        var titleText = self._calModalMode === 'add' ? 'New Scheduled Job' : 'Edit Job';
        var swatches = self._JOB_COLORS.map(function(c) {

      return '<div class="cal-wrap">' +

    },
    renderMetrics: function() {
      stackedId = 0;
      var costs = MOCK.costs;
      var txs = MOCK.transactions;

      // Per-provider totals
      var providerTotals = {};
      var providerTokens = {};
      PROVIDERS.forEach(function(p) {
        providerTotals[p] = TIMESERIES.costByProvider[p].reduce(function(a, b) { return a + b; }, 0);
        providerTokens[p] = TIMESERIES.tokensByProvider[p].reduce(function(a, b) { return a + b; }, 0);
      });
      var totalCost = PROVIDERS.reduce(function(s, p) { return s + providerTotals[p]; }, 0);
      var totalTokens = PROVIDERS.reduce(function(s, p) { return s + providerTokens[p]; }, 0);

      // X-axis labels (hours ago → now)
      var now = new Date();
      var xLabels = [];
      for (var i = 0; i < 24; i++) {
        var h = (now.getHours() - 23 + i + 24) % 24;
        xLabels.push(String(h).padStart(2, '0') + ':00');
      }

      // Cost stacked area chart
      var costChart = '<div class="card" style="margin-bottom:1rem;padding-bottom:0.75rem">' +
        '<div class="card-title">Cost by Provider (24h)</div>' +
        '<div style="display:flex;align-items:baseline;gap:0.75rem;margin-bottom:0.25rem"><div class="card-value">$' + totalCost.toFixed(2) + '</div>' +
        '<span style="font-size:0.75rem;color:var(--muted)">' + costs.length + ' requests</span></div>' +
        renderStackedArea(TIMESERIES.costByProvider, PROVIDERS, PROVIDER_COLORS, {
          height: 180, yAxis: true, xLabels: xLabels,
          yFormat: function(v) { return '$' + v.toFixed(3); }
        }) +
        '<div class="metrics-legend">';
      PROVIDERS.forEach(function(p) {
        var pct = totalCost > 0 ? (providerTotals[p] / totalCost * 100).toFixed(0) : '0';
        costChart += '<div class="metrics-legend-item"><div class="metrics-legend-dot" style="background:' + PROVIDER_COLORS[p] + '"></div>' + p + '<span class="metrics-legend-val">$' + providerTotals[p].toFixed(3) + ' (' + pct + '%)</span></div>';
      });
      costChart += '</div></div>';

      // Token stacked area chart
      var tokenChart = '<div class="card" style="margin-bottom:1rem;padding-bottom:0.75rem">' +
        '<div class="card-title">Token Volume by Provider (24h)</div>' +
        '<div style="display:flex;align-items:baseline;gap:0.75rem;margin-bottom:0.25rem"><div class="card-value">' + Math.round(totalTokens).toLocaleString() + '</div>' +
        '<span style="font-size:0.75rem;color:var(--muted)">tokens total</span></div>' +
        renderStackedArea(TIMESERIES.tokensByProvider, PROVIDERS, PROVIDER_COLORS, {
          height: 140, yAxis: true, xLabels: xLabels,
          yFormat: function(v) { return v >= 1000 ? (v / 1000).toFixed(1) + 'k' : Math.round(v).toString(); }
        }) +
        '<div class="metrics-legend">';
      PROVIDERS.forEach(function(p) {
        tokenChart += '<div class="metrics-legend-item"><div class="metrics-legend-dot" style="background:' + PROVIDER_COLORS[p] + '"></div>' + p + '<span class="metrics-legend-val">' + Math.round(providerTokens[p]).toLocaleString() + '</span></div>';
      });
      tokenChart += '</div></div>';

      // Summary stat boxes
      var avgCost = costs.length ? (totalCost / costs.length).toFixed(4) : '0';
      var statGrid = '<div class="metrics-summary-grid">' +
        '<div class="metrics-stat"><div class="metrics-stat-label">Avg / request</div><div class="metrics-stat-value">$' + avgCost + '</div></div>' +
        '<div class="metrics-stat"><div class="metrics-stat-label">Peak hour</div><div class="metrics-stat-value">$' + seriesMax(TIMESERIES.costPerHour).toFixed(3) + '</div></div>' +
        '<div class="metrics-stat"><div class="metrics-stat-label">Avg tokens/hr</div><div class="metrics-stat-value">' + Math.round(seriesAvg(TIMESERIES.tokensPerHour)).toLocaleString() + '</div></div>';
      PROVIDERS.forEach(function(p) {
        statGrid += '<div class="metrics-stat"><div class="metrics-stat-label">' + p + ' share</div><div class="metrics-stat-value" style="color:' + PROVIDER_COLORS[p] + '">' + (totalCost > 0 ? (providerTotals[p] / totalCost * 100).toFixed(0) : '0') + '%</div></div>';
      });
      statGrid += '</div>';

      // Transactions table
      var txRows = txs.map(function(t) {
        return '<tr><td class="card-mono">' + esc(t.tx_type) + '</td><td>' + esc(t.amount + ' ' + t.currency) + '</td><td>' + esc(t.counterparty) + '</td><td>' + esc(t.created_at) + '</td></tr>';
      }).join('');

      // Individual request table
      var costRows = costs.map(function(c) {
        var pColor = PROVIDER_COLORS[c.provider] || '#71717a';
        return '<tr><td class="card-mono">' + esc(truncate(c.id, 10)) + '</td><td>' + esc(c.model) + '</td><td><span style="color:' + pColor + '">' + esc(c.provider) + '</span></td><td>' + c.tokens_in + '</td><td>' + c.tokens_out + '</td><td>$' + c.cost + '</td><td>' + esc(c.created_at) + '</td></tr>';
      }).join('');

      return costChart + tokenChart + statGrid +
        '<p style="margin:1.25rem 0 0.5rem;color:var(--muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:0.06em">Transactions</p>' +
        '<div class="table-wrap" style="margin-bottom:1.25rem"><table><thead><tr><th>Type</th><th>Amount</th><th>Counterparty</th><th>Time</th></tr></thead><tbody>' + txRows + '</tbody></table></div>' +
        '<p style="margin-bottom:0.5rem;color:var(--muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:0.06em">Request log</p>' +
        '<div class="table-wrap"><table><thead><tr><th>ID</th><th>Model</th><th>Provider</th><th>In</th><th>Out</th><th>Cost</th><th>Time</th></tr></thead><tbody>' + costRows + '</tbody></table></div>';
    },
    renderWallet: function() {
      var w = MOCK.wallet;
      var txRows = MOCK.transactions.filter(function(t) { return t.currency === 'SOL'; }).map(function(t) {
        return '<tr><td>' + esc(t.tx_type) + '</td><td>' + esc(t.amount + ' ' + t.currency) + '</td><td>' + esc(t.created_at) + '</td></tr>';
      }).join('');
      return '<div class="card" style="margin-bottom:1rem"><div class="card-title">Balance</div><div class="card-value">' + esc(w.balance) + ' ' + esc(w.currency) + '</div></div>' +
        '<div class="card" style="margin-bottom:1rem"><div class="card-title">Address</div><div class="card-mono" style="word-break:break-all" id="wallet-addr">' + esc(w.address) + '</div><button class="btn secondary" style="margin-top:8px" id="copy-address">Copy</button></div>' +
        '<div class="card-title">Transaction history</div><div class="table-wrap"><table><thead><tr><th>Type</th><th>Amount</th><th>Date</th></tr></thead><tbody>' + txRows + '</tbody></table></div>';
    },
    _settingsMode: 'form',
    _settingsDraft: null,
    _settingsJsonText: null,
    _settingsDirty: false,
    _getSettingsDraft: function() {
      if (!this._settingsDraft) this._settingsDraft = JSON.parse(JSON.stringify(MOCK.config));
      return this._settingsDraft;
    },
    renderSettings: function() {
      var mode = this._settingsMode;
      var draft = this._getSettingsDraft();
      var dirty = this._settingsDirty;
      var dirtyDot = dirty ? '<span class="settings-dirty-dot" title="Unsaved changes"></span>' : '';

      var tabs = '<div class="tabs" style="margin-bottom:1rem">' +
        '<button class="' + (mode === 'form' ? 'active' : '') + '" data-settings-mode="form">Form</button>' +
        '<button class="' + (mode === 'json' ? 'active' : '') + '" data-settings-mode="json">JSON</button>' +
        '</div>';

      var actions = '<div class="settings-actions">' +
        '<button class="btn" id="settings-save" ' + (dirty ? '' : 'disabled style="opacity:0.4;pointer-events:none"') + '>Save</button>' +
        '<button class="btn secondary" id="settings-apply" ' + (dirty ? '' : 'disabled style="opacity:0.4;pointer-events:none"') + '>Apply</button>' +
        '<button class="btn secondary" id="settings-cancel" ' + (dirty ? '' : 'disabled style="opacity:0.4;pointer-events:none"') + '>Cancel</button>' +
        dirtyDot + '</div>';

      if (mode === 'json') {
        var jsonText = this._settingsJsonText != null ? this._settingsJsonText : JSON.stringify(draft, null, 2);
        var lintMsg = '', lintCls = 'ok';
        try { JSON.parse(jsonText); lintMsg = '\u2713 Valid JSON'; } catch (e) { lintMsg = '\u2717 ' + e.message; lintCls = 'err'; }

        return tabs +
          '<div class="settings-editor">' +
          '<textarea id="settings-json-editor" spellcheck="false">' + esc(jsonText) + '</textarea>' +
          '<div class="settings-lint ' + lintCls + '">' + esc(lintMsg) + '</div>' +
          '</div>' + actions;
      }

      // Form mode
      var html = tabs + '<div class="settings-form">';

      // Agent section
      html += '<div class="settings-section"><div class="settings-section-title">Agent</div>' +
        this._formRow('agent.id', 'ID', draft.agent.id, 'text') +
        this._formRow('agent.name', 'Name', draft.agent.name, 'text') +
        this._formRow('agent.workspace', 'Workspace', draft.agent.workspace, 'text') +
        '</div>';

      // Models section
      html += '<div class="settings-section"><div class="settings-section-title">Models</div>' +
        this._formRow('models.primary', 'Primary', draft.models.primary, 'text') +
        this._formRow('models.fallback', 'Fallback', draft.models.fallback, 'text') +
        this._formRow('models.embedding', 'Embedding', draft.models.embedding, 'text') +
        '</div>';

      // Server section
      html += '<div class="settings-section"><div class="settings-section-title">Server</div>' +
        this._formRow('server.host', 'Bind host', draft.server.host, 'text') +
        this._formRow('server.port', 'Port', draft.server.port, 'number') +
        this._formToggle('server.dashboard', 'Dashboard', draft.server.dashboard) +
        '</div>';

      // Memory section
      html += '<div class="settings-section"><div class="settings-section-title">Memory</div>' +
        this._formRow('memory.vector_dimensions', 'Dimensions', draft.memory.vector_dimensions, 'number') +
        this._formRow('memory.consolidation_interval', 'Consolidation', draft.memory.consolidation_interval, 'text') +
        this._formRow('memory.max_episodic', 'Max episodic', draft.memory.max_episodic, 'number') +
        '</div>';

      // Wallet section
      html += '<div class="settings-section"><div class="settings-section-title">Wallet</div>' +
        this._formRow('wallet.network', 'Network', draft.wallet.network, 'text') +
        this._formRow('wallet.rpc_url', 'RPC URL', draft.wallet.rpc_url, 'text') +
        '</div>';

      // Security section
      html += '<div class="settings-section"><div class="settings-section-title">Security</div>' +
        this._formToggle('security.api_key_required', 'API key required', draft.security.api_key_required) +
        this._formRow('security.rate_limit', 'Rate limit', draft.security.rate_limit, 'text') +
        '<div class="settings-nested">' +
        '<div style="font-size:0.625rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:0.5rem">Circuit Breaker</div>' +
        this._formRow('security.circuit_breaker.max_failures', 'Max failures', draft.security.circuit_breaker.max_failures, 'number') +
        this._formRow('security.circuit_breaker.reset_timeout', 'Reset timeout', draft.security.circuit_breaker.reset_timeout, 'text') +
        '</div></div>';

      html += '</div>' + actions;
      return html;
    },
    _formRow: function(path, label, value, type) {
      return '<div class="settings-row"><div class="settings-label">' + esc(label) + '</div>' +
        '<input class="settings-input" type="' + type + '" data-settings-path="' + esc(path) + '" value="' + esc(String(value)) + '"></div>';
    },
    _formToggle: function(path, label, value) {
      return '<div class="settings-row"><div class="settings-label">' + esc(label) + '</div>' +
        '<div class="settings-toggle-wrap"><label class="toggle"><input type="checkbox" data-settings-path="' + esc(path) + '"' + (value ? ' checked' : '') + '><span class="toggle-track"></span></label>' +
        '<span class="settings-toggle-label">' + (value ? 'On' : 'Off') + '</span></div></div>';
    },
    _setNestedValue: function(obj, path, value) {
      var parts = path.split('.');
      var cur = obj;
      for (var i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
      cur[parts[parts.length - 1]] = value;
    },
    _getNestedValue: function(obj, path) {
      var parts = path.split('.');
      var cur = obj;
      for (var i = 0; i < parts.length; i++) cur = cur[parts[i]];
      return cur;
    },
    renderWorkspace: function() {
      return '<div id="ws-wrap" style="position:relative;width:100%;height:100%;min-height:0;overflow:hidden"><canvas id="ws-canvas" style="display:block;border-radius:var(--radius)"></canvas></div>';
    }
  };

  // ── Event Binding ──────────────────────────────────────────

  function onHash() {
    var hash = (window.location.hash || '#overview').slice(1) || 'overview';
    if (pages.indexOf(hash) === -1) hash = 'overview';
    App.navigate(hash);
  }

  document.querySelectorAll('.sidebar-nav a, .mobile-nav a').forEach(function(a) {
    a.addEventListener('click', function(ev) {
      ev.preventDefault();
      var p = a.getAttribute('data-page');
      if (p) window.location.hash = p;
      var sb = document.getElementById('sidebar');
      if (sb && window.innerWidth <= 768) sb.classList.remove('open');
    });
  });

  // Theme picker
  var themeNames = { 'ai-purple': 'AI Purple', 'crt-orange': 'CRT Orange', 'crt-green': 'CRT Green', 'psychedelic': 'Psychedelic Freakout' };
  var themeToggle = document.getElementById('theme-toggle');
  var themeDropdown = document.getElementById('theme-dropdown');
  if (themeToggle && themeDropdown) {
    themeToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      themeDropdown.classList.toggle('open');
    });
    document.addEventListener('click', function() { themeDropdown.classList.remove('open'); });
    themeDropdown.addEventListener('click', function(e) {
      var opt = e.target.closest('[data-theme-set]');
      if (!opt) return;
      var theme = opt.getAttribute('data-theme-set');
      document.documentElement.setAttribute('data-theme', theme);
      document.querySelectorAll('.theme-option').forEach(function(o) { o.classList.toggle('active', o.getAttribute('data-theme-set') === theme); });
      var nameEl = document.getElementById('theme-name');
      if (nameEl) nameEl.textContent = themeNames[theme] || theme;
      themeDropdown.classList.remove('open');
      if (App.page === 'overview') App.navigate('overview');
    });
  }

  // Sidebar collapse toggle
  var collapseBtn = document.getElementById('sidebar-collapse');
  if (collapseBtn) {
    collapseBtn.addEventListener('click', function() {
      var sb = document.getElementById('sidebar');
      if (sb) {
        sb.classList.toggle('collapsed');
        collapseBtn.title = sb.classList.contains('collapsed') ? 'Expand sidebar' : 'Collapse sidebar';
      }
    });
  }

  window.addEventListener('hashchange', onHash);

  var content = document.getElementById('content');
  if (content) content.addEventListener('click', function(e) {
    if (e.target.closest('#btn-new-session')) {
      var ns = { id: 'ses_' + randomId(), agent_id: 'duncan', created_at: timeAgo(0), updated_at: timeAgo(0), messages: [] };
      MOCK.sessions.unshift(ns);
      toast('Session created: ' + ns.id);
      App.navigate('sessions');
      return;
    }
    if (e.target.closest('#btn-reload-skills')) { toast('Skills reloaded'); App.navigate('skills'); return; }
    var skillToggle = e.target.closest('[data-skill-toggle]');
    if (skillToggle) {
      var sid = skillToggle.getAttribute('data-skill-toggle');
      var skill = MOCK.skills.find(function(s) { return s.id === sid; });
      if (skill) {
        skill.enabled = skillToggle.checked;
        toast(skill.name + ' ' + (skill.enabled ? 'enabled' : 'disabled'));
        App.navigate('skills');
      }
      return;
    }
    if (e.target.closest('#copy-address')) {
      var pre = document.getElementById('wallet-addr');
      if (pre && pre.textContent) navigator.clipboard.writeText(pre.textContent).then(function() { toast('Address copied'); });
      return;
    }
    if (e.target.closest('#memory-search-btn')) {
      var q = document.getElementById('memory-search-q');
      var query = (q && q.value) || '';
      if (!query.trim()) { toast('Enter a search query'); return; }
      var res = document.getElementById('memory-search-results');
      var allMem = MOCK.episodic.concat(MOCK.semantic).concat(MOCK.working);
      var matches = allMem.filter(function(e) { return e.content.toLowerCase().indexOf(query.toLowerCase()) !== -1; });
      if (res) setHtml(res, matches.map(function(e) {
        return '<div class="card" style="margin-bottom:0.5rem"><div class="card-mono">' + esc(e.content) + '</div><span class="badge muted">' + esc(e.entry_type || e.category || '') + '</span></div>';
      }).join('') || '<p style="color:var(--muted)">No results</p>');
      return;
    }
    var tabBtn = e.target.closest('.tabs button[data-tab]');
    if (tabBtn) {
      App._memoryTab = tabBtn.getAttribute('data-tab');
      App.navigate('memory');
      return;
    }
    // Settings mode tabs
    var settingsMode = e.target.closest('[data-settings-mode]');
    if (settingsMode) {
      var newMode = settingsMode.getAttribute('data-settings-mode');
      if (newMode === 'json' && App._settingsMode === 'form') {
        App._settingsJsonText = JSON.stringify(App._getSettingsDraft(), null, 2);
      }
      if (newMode === 'form' && App._settingsMode === 'json' && App._settingsJsonText) {
        try { App._settingsDraft = JSON.parse(App._settingsJsonText); } catch(e) {}
      }
      App._settingsMode = newMode;
      App.navigate('settings');
      return;
    }
    // Settings save
    if (e.target.closest('#settings-save')) {
      if (App._settingsMode === 'json') {
        try {
          App._settingsDraft = JSON.parse(App._settingsJsonText || '{}');
        } catch(err) { toast('Fix JSON errors before saving'); return; }
      }
      MOCK.config = JSON.parse(JSON.stringify(App._getSettingsDraft()));
      App._settingsDirty = false;
      App._settingsJsonText = null;
      toast('Configuration saved');
      App.navigate('settings');
      return;
    }
    // Settings apply (save + show toast that it would restart)
    if (e.target.closest('#settings-apply')) {
      if (App._settingsMode === 'json') {
        try {
          App._settingsDraft = JSON.parse(App._settingsJsonText || '{}');
        } catch(err) { toast('Fix JSON errors before applying'); return; }
      }
      MOCK.config = JSON.parse(JSON.stringify(App._getSettingsDraft()));
      App._settingsDirty = false;
      App._settingsJsonText = null;
      toast('Configuration applied — agent would restart');
      App.navigate('settings');
      return;

  // ── Workspace Engine (copied from production) ──────────────

  var workspace = null;

  function startWorkspaceEngine(data) {
    if (workspace) { workspace.stop(); workspace = null; }
    var canvas = document.getElementById('ws-canvas');
    if (!canvas) return;
    workspace = new WorkspaceEngine(canvas, data);
    workspace.start();
  }

  function WorkspaceEngine(canvas, data) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.running = false;
    this.animId = 0;
    this.time = 0;
    this.bots = [];
    this.stations = [];
    this.tethers = [];
    this.interactions = [];
    this.dpr = window.devicePixelRatio || 1;
    var self = this;
    this._resizeObs = new ResizeObserver(function() { self.resize(); });
    this._resizeObs.observe(canvas.parentElement);
    this.initData(data);
  }

  WorkspaceEngine.prototype.initData = function(data) {
    var agents = data.agents || [];
    var stations = data.workstations || [];
    this.stations = stations.map(function(s) { return { id: s.id, name: s.name, kind: s.kind, x: s.x, y: s.y }; });
    if (this.stations.length === 0) {
      this.stations = [
        { id: 'llm', name: 'LLM', kind: 'Inference', x: 0.2, y: 0.3 },
        { id: 'memory', name: 'Memory', kind: 'Storage', x: 0.8, y: 0.3 },
        { id: 'exec', name: 'Execute', kind: 'Code', x: 0.5, y: 0.8 }
      ];
    }
    var self = this;
    this.bots = agents.map(function(a, i) {
      var station = null;
      if (a.current_workstation) station = self.stations.find(function(s) { return s.id === a.current_workstation; });
      var startX = station ? station.x : 0.5 + (Math.random() - 0.5) * 0.2;
      var startY = station ? station.y : 0.5 + (Math.random() - 0.5) * 0.2;
      return {
        id: a.id, name: a.name, role: a.role || 'specialist', state: (a.state || 'Idle').toString(),
        color: a.color || '#6366f1', subordinates: a.subordinates || [], supervisor: a.supervisor || null,
        x: startX, y: startY, targetX: startX, targetY: startY,
        vx: 0, vy: 0, animState: 'idle', animFrame: 0, animTimer: Math.random() * 6,
        headAngle: 0, headTarget: 0, headTimer: Math.random() * 4,
        lights: [1, 0.5, 0.2], lightTimer: Math.random() * 2,
        blinkTimer: 3 + Math.random() * 5, blinking: false, workTimer: 0,
        talkBubble: 0, currentStation: a.current_workstation || null
      };
    });
    this.tethers = [];
    for (var i = 0; i < this.bots.length; i++) {
      var bot = this.bots[i];
      if (bot.subordinates && bot.subordinates.length > 0) {
        for (var j = 0; j < bot.subordinates.length; j++) {
          var sub = this.bots.find(function(b) { return b.id === bot.subordinates[j]; });
          if (sub) this.tethers.push({ from: bot, to: sub, color: bot.color });
        }
      }
    }
    this.assignIdleBehaviors();
  };

  WorkspaceEngine.prototype.assignIdleBehaviors = function() {
    var self = this;
    this.bots.forEach(function(bot, i) {
      if (self.stations.length > 0) {
        var s = self.stations[i % self.stations.length];
        bot.targetX = s.x + (Math.random() - 0.5) * 0.05;
        bot.targetY = s.y + 0.08;
        bot.currentStation = s.id;
      }
    });
  };

  WorkspaceEngine.prototype.resize = function() {
    var parent = this.canvas.parentElement;
    if (!parent) return;
    var w = parent.clientWidth;
    var h = parent.clientHeight;
    if (w < 1 || h < 1) return;
    this.canvas.width = w * this.dpr;
    this.canvas.height = h * this.dpr;
    this.canvas.style.width = w + 'px';
    this.canvas.style.height = h + 'px';
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    this.W = w;
    this.H = h;
  };

  WorkspaceEngine.prototype.start = function() {
    this.running = true;
    this.resize();
    this.lastTime = performance.now();
    var self = this;
    (function loop(ts) {
      if (!self.running) return;
      var dt = Math.min((ts - self.lastTime) / 1000, 0.05);
      self.lastTime = ts;
      self.time += dt;
      self.update(dt);
      self.render();
      self.animId = requestAnimationFrame(loop);
    })(performance.now());
  };

  WorkspaceEngine.prototype.stop = function() {
    this.running = false;
    cancelAnimationFrame(this.animId);
    if (this._resizeObs) this._resizeObs.disconnect();
  };

  WorkspaceEngine.prototype.update = function(dt) {
    var self = this;
    this.bots.forEach(function(bot) {
      var dx = bot.targetX - bot.x;
      var dy = bot.targetY - bot.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 0.005) {
        var speed = 0.4;
        var step = Math.min(speed * dt, dist);
        bot.x += (dx / dist) * step;
        bot.y += (dy / dist) * step;
        bot.animState = 'walking';
      } else {
        bot.x = bot.targetX; bot.y = bot.targetY;
        if (bot.animState === 'walking') bot.animState = 'idle';
      }
      bot.headTimer -= dt;
      if (bot.headTimer <= 0) { bot.headTarget = (Math.random() - 0.5) * 0.6; bot.headTimer = 2 + Math.random() * 4; }
      bot.headAngle += (bot.headTarget - bot.headAngle) * 2 * dt;
      bot.lightTimer -= dt;
      if (bot.lightTimer <= 0) { bot.lights = [Math.random(), Math.random(), Math.random()]; bot.lightTimer = 0.3 + Math.random() * 0.8; }
      bot.blinkTimer -= dt;
      if (bot.blinkTimer <= 0) { bot.blinking = !bot.blinking; bot.blinkTimer = bot.blinking ? 0.12 : (2.5 + Math.random() * 4); }
      bot.animTimer += dt;
      if (bot.animTimer > 0.18) { bot.animFrame = (bot.animFrame + 1) % 4; bot.animTimer = 0; }
      if (bot.animState === 'working') { bot.workTimer += dt; if (bot.workTimer > 4) { bot.animState = 'idle'; bot.workTimer = 0; } }
      if (bot.animState === 'idle' && Math.random() < 0.003) {
        var s = self.stations[Math.floor(Math.random() * self.stations.length)];
        if (s) { bot.targetX = s.x + (Math.random() - 0.5) * 0.04; bot.targetY = s.y + 0.08 + (Math.random() - 0.5) * 0.02; bot.currentStation = s.id; }
      }
      if (bot.animState === 'idle' && dist < 0.01 && Math.random() < 0.008) { bot.animState = 'working'; bot.workTimer = 0; }
    });

    // Trigger random A2A interactions in demo
    if (this.bots.length > 1 && this.interactions.length === 0 && Math.random() < 0.001) {
      var a = Math.floor(Math.random() * this.bots.length);
      var b = (a + 1 + Math.floor(Math.random() * (this.bots.length - 1))) % this.bots.length;
      var botA = this.bots[a], botB = this.bots[b];
      var meetX = 0.5 + (Math.random() - 0.5) * 0.15;
      var meetY = 0.5 + (Math.random() - 0.5) * 0.15;
      botA._savedTarget = { x: botA.targetX, y: botA.targetY };
      botB._savedTarget = { x: botB.targetX, y: botB.targetY };
      botA.targetX = meetX - 0.04; botA.targetY = meetY;
      botB.targetX = meetX + 0.04; botB.targetY = meetY;
      botA.animState = 'talking'; botB.animState = 'talking';
      this.interactions.push({ botA: botA, botB: botB, timer: 4 + Math.random() * 3 });
    }

    for (var i = this.interactions.length - 1; i >= 0; i--) {
      var ix = this.interactions[i];
      ix.timer -= dt;
      if (ix.timer <= 0) {
        if (ix.botA._savedTarget) { ix.botA.targetX = ix.botA._savedTarget.x; ix.botA.targetY = ix.botA._savedTarget.y; delete ix.botA._savedTarget; }
        if (ix.botB._savedTarget) { ix.botB.targetX = ix.botB._savedTarget.x; ix.botB.targetY = ix.botB._savedTarget.y; delete ix.botB._savedTarget; }
        ix.botA.animState = 'idle'; ix.botB.animState = 'idle';
        this.interactions.splice(i, 1);
      }
    }
  };

  WorkspaceEngine.prototype.render = function() {
    var ctx = this.ctx; var W = this.W; var H = this.H;
    if (!W || !H) return;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0a0b0f'; ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = 'rgba(99,102,241,0.06)';
    for (var gx = 30; gx < W; gx += 40) for (var gy = 30; gy < H; gy += 40) { ctx.beginPath(); ctx.arc(gx, gy, 1, 0, Math.PI * 2); ctx.fill(); }

    var self = this;
    this.stations.forEach(function(s) {
      var sx = s.x * W, sy = s.y * H;
      ctx.save(); ctx.translate(sx, sy);
      var pulse = 0.6 + 0.4 * Math.sin(self.time * 1.5 + sx * 0.01);
      var accentR = 99, accentG = 102, accentB = 241;

      // Platform / glow
      ctx.fillStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',0.04)';
      ctx.beginPath(); ctx.arc(0, 8, 38, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',' + (0.12 + 0.05 * pulse) + ')';
      ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, 8, 38, 0, Math.PI * 2); ctx.stroke();

      var kind = (s.kind || '').toLowerCase();

      if (kind === 'inference') {
        // LLM: brain / neural network nodes
        ctx.strokeStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',0.3)'; ctx.lineWidth = 1;
        var nodes = [[-12,-18],[12,-18],[0,-6],[-18,-4],[18,-4],[-8,6],[8,6],[0,16]];
        var edges = [[0,2],[1,2],[0,3],[1,4],[2,5],[2,6],[3,5],[4,6],[5,7],[6,7]];
        edges.forEach(function(e) {
          ctx.beginPath(); ctx.moveTo(nodes[e[0]][0], nodes[e[0]][1]); ctx.lineTo(nodes[e[1]][0], nodes[e[1]][1]); ctx.stroke();
        });
        nodes.forEach(function(n, i) {
          var r = i === 2 || i === 7 ? 4.5 : 3.5;
          ctx.fillStyle = '#1e2030'; ctx.beginPath(); ctx.arc(n[0], n[1], r, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',' + (0.5 + 0.3 * pulse) + ')'; ctx.lineWidth = 1.5; ctx.stroke();
          ctx.fillStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',' + (0.3 + 0.4 * ((Math.sin(self.time * 3 + i * 1.2) + 1) / 2)) + ')';
          ctx.beginPath(); ctx.arc(n[0], n[1], r - 1, 0, Math.PI * 2); ctx.fill();
        });

      } else if (kind === 'storage') {
        // Memory: stacked database cylinders
        for (var ci = 0; ci < 3; ci++) {
          var cy = -14 + ci * 11;
          ctx.fillStyle = '#1e2030';
          ctx.beginPath(); ctx.ellipse(0, cy + 8, 18, 4, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillRect(-18, cy, 36, 8);
          ctx.beginPath(); ctx.ellipse(0, cy, 18, 4, 0, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',' + (0.3 + 0.1 * ci) + ')'; ctx.lineWidth = 1.2;
          ctx.beginPath(); ctx.ellipse(0, cy, 18, 4, 0, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(-18, cy); ctx.lineTo(-18, cy + 8); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(18, cy); ctx.lineTo(18, cy + 8); ctx.stroke();
          ctx.beginPath(); ctx.ellipse(0, cy + 8, 18, 4, 0, Math.PI, Math.PI * 2); ctx.stroke();
          // Data shimmer
          ctx.fillStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',' + (0.08 + 0.06 * Math.sin(self.time * 2 + ci)) + ')';
          ctx.fillRect(-16, cy + 1, 32, 6);
        }

      } else if (kind === 'execution') {
        // Code: terminal window
        ctx.fillStyle = '#1e2030'; ctx.strokeStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',0.35)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(-22, -18, 44, 34, 4); ctx.fill(); ctx.stroke();
        // Title bar
        ctx.fillStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',0.12)';
        ctx.fillRect(-22, -18, 44, 8);
        ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(-16, -14, 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#eab308'; ctx.beginPath(); ctx.arc(-10, -14, 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.arc(-4, -14, 2, 0, Math.PI * 2); ctx.fill();
        // Prompt lines
        ctx.fillStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',0.6)';
        ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left';
        ctx.fillText('$_', -17, -2);
        ctx.fillStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',0.25)';
        ctx.fillRect(-8, -6, 20 * pulse, 2);
        ctx.fillRect(-17, 3, 26, 1.5);
        ctx.fillRect(-17, 8, 18, 1.5);
        // Cursor blink
        if (Math.sin(self.time * 4) > 0) {
          ctx.fillStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',0.8)';
          ctx.fillRect(-10, -6, 6, 8);
        }

      } else if (kind === 'blockchain') {
        // Wallet: hexagonal token / coin
        ctx.save();
        var hexR = 16;
        // Outer hex
        ctx.beginPath();
        for (var hi = 0; hi < 6; hi++) {
          var angle = Math.PI / 6 + hi * Math.PI / 3;
          var hx = Math.cos(angle) * hexR, hy = Math.sin(angle) * hexR;
          if (hi === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        ctx.fillStyle = '#1e2030'; ctx.fill();
        ctx.strokeStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',' + (0.35 + 0.15 * pulse) + ')'; ctx.lineWidth = 1.5; ctx.stroke();
        // Inner hex
        var innerR = 10;
        ctx.beginPath();
        for (var hi = 0; hi < 6; hi++) {
          var angle = Math.PI / 6 + hi * Math.PI / 3;
          var hx = Math.cos(angle) * innerR, hy = Math.sin(angle) * innerR;
          if (hi === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        ctx.strokeStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',0.2)'; ctx.lineWidth = 1; ctx.stroke();
        // SOL symbol (S)
        ctx.fillStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',' + (0.5 + 0.3 * pulse) + ')';
        ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('\u25c8', 0, 0);
        ctx.restore();

      } else if (kind === 'tool') {
        // Browser: browser window with globe
        ctx.fillStyle = '#1e2030'; ctx.strokeStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',0.35)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(-22, -18, 44, 34, 4); ctx.fill(); ctx.stroke();
        // URL bar
        ctx.fillStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',0.1)';
        ctx.fillRect(-22, -18, 44, 9);
        // Back / forward dots
        ctx.fillStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',0.25)';
        ctx.beginPath(); ctx.arc(-17, -13.5, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(-12, -13.5, 1.5, 0, Math.PI * 2); ctx.fill();
        // URL bar
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath(); ctx.roundRect(-8, -16, 26, 5, 2); ctx.fill();
        ctx.fillStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',0.3)';
        ctx.font = '5px monospace'; ctx.textAlign = 'left';
        ctx.fillText('https://...', -6, -12.5);
        // Globe
        ctx.strokeStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',' + (0.3 + 0.15 * pulse) + ')'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(0, 3, 9, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(0, 3, 4, 9, 0, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-9, 3); ctx.lineTo(9, 3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-8, -2); ctx.lineTo(8, -2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-8, 8); ctx.lineTo(8, 8); ctx.stroke();

      } else {
        // Fallback: generic box
        ctx.fillStyle = '#1e2030'; ctx.strokeStyle = 'rgba(' + accentR + ',' + accentG + ',' + accentB + ',0.3)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(-20, -16, 40, 30, 4); ctx.fill(); ctx.stroke();
      }

      // Label
      ctx.fillStyle = '#71717a'; ctx.font = '10px ' + getComputedStyle(document.body).fontFamily; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(s.name, 0, 30);
      ctx.restore();
    });

    this.tethers.forEach(function(t) {
      ctx.save(); ctx.setLineDash([4, 4]); ctx.strokeStyle = t.color + '40'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(t.from.x * W, t.from.y * H); ctx.lineTo(t.to.x * W, t.to.y * H); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    });

    this.interactions.forEach(function(ix) {
      var midX = (ix.botA.x + ix.botB.x) / 2 * W, midY = (ix.botA.y + ix.botB.y) / 2 * H - 50;
      var pulse = Math.sin(self.time * 5) * 0.5 + 0.5;
      ctx.save(); ctx.fillStyle = 'rgba(99,102,241,' + (0.2 + 0.1 * pulse) + ')';
      ctx.beginPath(); ctx.arc(midX - 8, midY, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(midX, midY - 2, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(midX + 10, midY - 1, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    });

    var sortedBots = this.bots.slice().sort(function(a, b) { return a.y - b.y; });
    sortedBots.forEach(function(bot) { self.drawBot(ctx, bot, W, H); });
  };

  WorkspaceEngine.prototype.drawBot = function(ctx, bot, W, H) {
    var px = bot.x * W, py = bot.y * H, t = this.time, frame = bot.animFrame;
    var isAgent = (bot.role === 'agent');
    var scale = isAgent ? 1.0 : 0.7;
    var bodyW = isAgent ? 20 : 14, bodyH = isAgent ? 24 : 18;
    var walkBob = (bot.animState === 'walking') ? Math.sin(t * 12) * 2 : 0;

    ctx.save(); ctx.translate(px, py + walkBob); ctx.scale(scale, scale);

    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, bodyH + 4, bodyW * 0.6, 4, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = bot.color; ctx.strokeStyle = bot.color + 'cc'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(-bodyW, -bodyH * 0.3, bodyW * 2, bodyH, isAgent ? 4 : 8); ctx.fill(); ctx.stroke();

    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(-bodyW + 3, -bodyH * 0.3 + 3, bodyW * 2 - 6, bodyH * 0.35);

    var lightColors = ['#22c55e', '#eab308', '#ef4444'];
    for (var li = 0; li < 3; li++) {
      var lx = -bodyW + 6 + li * 7, ly = -bodyH * 0.3 + 7;
      ctx.fillStyle = lightColors[li]; ctx.globalAlpha = 0.3 + 0.7 * bot.lights[li];
      ctx.beginPath(); ctx.arc(lx, ly, 2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (isAgent) {
      var legOffset = (bot.animState === 'walking') ? Math.sin(t * 10) * 4 : 0;
      ctx.fillStyle = bot.color + 'bb';
      ctx.fillRect(-bodyW + 4, bodyH * 0.7 - 2, 7, 10 + (legOffset > 0 ? legOffset : 0));
      ctx.fillRect(bodyW - 11, bodyH * 0.7 - 2, 7, 10 + (legOffset < 0 ? -legOffset : 0));
      ctx.fillStyle = '#1e2030';
      ctx.fillRect(-bodyW + 2, bodyH * 0.7 + 7 + Math.max(0, legOffset), 11, 4);
      ctx.fillRect(bodyW - 13, bodyH * 0.7 + 7 + Math.max(0, -legOffset), 11, 4);
    } else {
      var treadOffset = (bot.animState === 'walking') ? (frame * 3) % 12 : 0;
      ctx.fillStyle = '#1e2030'; ctx.beginPath(); ctx.roundRect(-bodyW - 2, bodyH * 0.5, bodyW * 2 + 4, 8, 4); ctx.fill();
      ctx.strokeStyle = bot.color + '88'; ctx.lineWidth = 1; ctx.stroke();
      ctx.strokeStyle = bot.color + '44';
      for (var ti = 0; ti < 5; ti++) { var tx = -bodyW + 2 + (ti * 9 + treadOffset) % (bodyW * 2); ctx.beginPath(); ctx.moveTo(tx, bodyH * 0.5 + 1); ctx.lineTo(tx, bodyH * 0.5 + 7); ctx.stroke(); }
    }

    if (bot.animState === 'working') {
      var armAngle = Math.sin(t * 4) * 0.3;
      ctx.save(); ctx.translate(bodyW + 2, 0); ctx.rotate(-0.5 + armAngle);
      ctx.fillStyle = bot.color + 'cc'; ctx.fillRect(0, -2, 14, 4);
      ctx.fillStyle = '#eab308'; ctx.beginPath(); ctx.arc(14, 0, 3, 0, Math.PI * 2); ctx.fill();
      if (frame % 2 === 0) {
        ctx.fillStyle = '#eab308'; ctx.globalAlpha = 0.7;
        for (var si = 0; si < 3; si++) { var sa = Math.random() * Math.PI * 2; ctx.beginPath(); ctx.arc(14 + Math.cos(sa) * 5, Math.sin(sa) * 5, 1.5, 0, Math.PI * 2); ctx.fill(); }
        ctx.globalAlpha = 1;
      }
      ctx.restore();
    }

    ctx.save(); ctx.translate(0, -bodyH * 0.3); ctx.rotate(bot.headAngle);
    var headW = isAgent ? 18 : 14, headH = isAgent ? 16 : 12;
    ctx.fillStyle = bot.color + 'aa'; ctx.fillRect(-3, -4, 6, 5);
    ctx.fillStyle = bot.color; ctx.strokeStyle = bot.color + 'cc'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (isAgent) { ctx.roundRect(-headW, -headH - 4, headW * 2, headH, 5); } else { ctx.arc(0, -headH * 0.5 - 2, headW * 0.85, 0, Math.PI * 2); }
    ctx.fill(); ctx.stroke();

    if (isAgent) {
      ctx.strokeStyle = bot.color + 'cc'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, -headH - 4); ctx.lineTo(0, -headH - 14); ctx.stroke();
      var antGlow = 0.5 + 0.5 * Math.sin(t * 3);
      ctx.fillStyle = bot.color; ctx.globalAlpha = 0.5 + 0.5 * antGlow;
      ctx.beginPath(); ctx.arc(0, -headH - 15, 3, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
    }

    if (isAgent) {
      var eyeY = -headH * 0.5 - 2;
      if (bot.blinking) { ctx.fillStyle = '#1e2030'; ctx.fillRect(-headW + 4, eyeY - 1, headW - 6, 2); ctx.fillRect(3, eyeY - 1, headW - 6, 2); }
      else {
        ctx.fillStyle = '#1e2030'; ctx.beginPath(); ctx.arc(-headW * 0.4, eyeY, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(headW * 0.4, eyeY, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#e4e4e7'; ctx.beginPath(); ctx.arc(-headW * 0.4 + bot.headAngle * 3, eyeY, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(headW * 0.4 + bot.headAngle * 3, eyeY, 2, 0, Math.PI * 2); ctx.fill();
      }
    } else {
      var visorY = -headH * 0.5 - 2;
      var visorGlow = 0.6 + 0.4 * Math.sin(t * 2.5 + px * 0.01);
      ctx.fillStyle = '#1e2030'; ctx.beginPath(); ctx.roundRect(-headW * 0.6, visorY - 3, headW * 1.2, 6, 3); ctx.fill();
      ctx.fillStyle = bot.color; ctx.globalAlpha = visorGlow; ctx.beginPath(); ctx.roundRect(-headW * 0.5, visorY - 2, headW, 4, 2); ctx.fill(); ctx.globalAlpha = 1;
      var scanX = Math.sin(t * 3 + px * 0.01) * headW * 0.35;
      ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.6; ctx.beginPath(); ctx.arc(scanX, visorY, 1.5, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
    }
    ctx.restore();

    if (isAgent && bot.subordinates && bot.subordinates.length > 0) {
      ctx.save(); ctx.translate(0, -bodyH * 0.3 - (isAgent ? 24 : 18));
      ctx.strokeStyle = bot.color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-6, -18); ctx.lineTo(0, -22); ctx.lineTo(6, -18); ctx.stroke();
      ctx.restore();
    }

    ctx.save();
    var tagY = -bodyH * 0.3 - (isAgent ? 30 : 20) - (isAgent && bot.subordinates && bot.subordinates.length > 0 ? 10 : 0);
    ctx.font = 'bold 10px ' + getComputedStyle(document.body).fontFamily; ctx.textAlign = 'center';
    var nameW = ctx.measureText(bot.name).width + 12;
    ctx.fillStyle = 'rgba(18,19,26,0.85)'; ctx.beginPath(); ctx.roundRect(-nameW / 2, tagY - 7, nameW, 14, 7); ctx.fill();
    ctx.strokeStyle = bot.color + '66'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = '#e4e4e7'; ctx.fillText(bot.name, 0, tagY + 3);
    var dotColor = bot.state === 'Running' ? '#22c55e' : (bot.state === 'Error' ? '#ef4444' : '#eab308');
    ctx.fillStyle = dotColor; ctx.beginPath(); ctx.arc(nameW / 2 - 4, tagY, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    ctx.restore();
  };

  onHash();
})();
  </script>
