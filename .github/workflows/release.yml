name: Release

# Notification secrets (optional — notifications are skipped if not configured):
#   Email (via Resend SMTP or any SMTP provider):
#     SMTP_SERVER          e.g. smtp.resend.com
#     SMTP_PORT            e.g. 465
#     SMTP_USERNAME        e.g. resend
#     SMTP_PASSWORD        e.g. re_YOUR_API_KEY
#     RELEASE_NOTIFY_EMAIL recipient address
#     RELEASE_FROM_EMAIL   (optional) sender address, must match verified domain
#   Discord:
#     DISCORD_RELEASE_WEBHOOK

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Preflight: validate tag matches workspace version ──
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      date: ${{ steps.meta.outputs.date }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate version
        id: meta
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          ws_ver=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

          # Strip semver build metadata (+...) for comparison — 0.9.2+hotfix.1 == 0.9.2
          tag_base="${tag%%+*}"

          echo "Tag version:       $tag"
          echo "Tag base version:  $tag_base"
          echo "Workspace version: $ws_ver"

          if [ "$tag_base" != "$ws_ver" ]; then
            echo "::error::Tag v$tag (base: $tag_base) does not match workspace version $ws_ver"
            exit 1
          fi

          if ! grep -q "## \[$tag_base\]" CHANGELOG.md; then
            echo "::error::No CHANGELOG.md entry for version $tag_base"
            exit 1
          fi

          echo "version=$tag" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Validate registry catalog
        run: bash scripts/validate-registry-catalog.sh

  # ── Verify: mandatory smoke + provenance preflight ──────
  release-gates:
    name: Release Gates
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-gates
      - name: Install just
        run: cargo install just --locked
      - name: "Release-critical: Workspace tests"
        run: cargo test --workspace --locked
      - name: "Release-critical: Server API integration"
        run: cargo test -p ironclad-tests server_api:: --locked
      - name: "Release-critical: Regression battery"
        run: just test-regression
      - name: Provenance generator self-test
        run: scripts/generate-provenance.sh --self-test

  # ── Verify: UAT smoke stack (CLI + Web) ─────────────────
  uat-smoke:
    name: UAT Smoke
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run UAT stack
        run: bash scripts/run-uat-stack.sh

  # ── Verify: bounded soak/fuzz ───────────────────────────
  soak-fuzz:
    name: Soak/Fuzz
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install nightly toolchain for fuzzing
        run: rustup toolchain install nightly --profile minimal
      - name: Install just and cargo-fuzz
        run: cargo install just cargo-fuzz --locked
      - name: Run soak/fuzz battery
        env:
          SOAK_ROUNDS: "4"
          FUZZ_SECONDS: "45"
        run: just test-soak-fuzz

  # ── Verify: docs/release artifact consistency ───────────
  release-doc-gate:
    name: Release Docs Gate
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install just
        run: cargo install just --locked
      - name: Run release doc gate
        env:
          RELEASE_TARGET_VERSION: ${{ needs.preflight.outputs.version }}
        run: just test-release-doc-gate

  # ── Build: cross-platform binary matrix ────────────────
  build:
    name: "Build (${{ matrix.target }})"
    needs: [preflight, release-gates]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: x86_64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: aarch64
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-14
            os: darwin
            arch: x86_64
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-14
            os: darwin
            arch: aarch64
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            arch: x86_64
            use_cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build release binary
        env:
          TARGET: ${{ matrix.target }}
          USE_CROSS: ${{ matrix.use_cross }}
        run: |
          if [ "$USE_CROSS" = "true" ]; then
            cross build --release --locked --bin ironclad --target "$TARGET"
          else
            cargo build --release --locked --bin ironclad --target "$TARGET"
          fi
        shell: bash

      - name: Package artifact (unix)
        if: matrix.os != 'windows'
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TARGET: ${{ matrix.target }}
          ARCH: ${{ matrix.arch }}
          OS: ${{ matrix.os }}
        run: |
          artifact="ironclad-${VERSION}-${ARCH}-${OS}"
          mkdir -p "$artifact"
          cp "target/${TARGET}/release/ironclad" "$artifact/"
          tar czf "${artifact}.tar.gz" "$artifact"
          shasum -a 256 "${artifact}.tar.gz" | awk '{print $1}' > "${artifact}.tar.gz.sha256"
          size=$(ls -l "${artifact}.tar.gz" | awk '{print $5}')
          mb=$(echo "scale=1; $size / 1048576" | bc)
          echo "${mb} MB" > "${artifact}.tar.gz.size"
          # Raw binary size (for site metrics display)
          raw_size=$(ls -l "target/${TARGET}/release/ironclad" | awk '{print $5}')
          raw_mb=$(echo "scale=0; $raw_size / 1048576" | bc)
          echo "~${raw_mb}MB" > "${artifact}.tar.gz.binsize"
          echo "ARTIFACT=${artifact}.tar.gz" >> "$GITHUB_ENV"

      - name: Package artifact (windows)
        if: matrix.os == 'windows'
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          ARCH: ${{ matrix.arch }}
          OS: ${{ matrix.os }}
          TARGET: ${{ matrix.target }}
        shell: pwsh
        run: |
          $artifact = "ironclad-${env:VERSION}-${env:ARCH}-${env:OS}"
          New-Item -ItemType Directory -Path $artifact | Out-Null
          Copy-Item "target/${env:TARGET}/release/ironclad.exe" "$artifact/"
          Compress-Archive -Path "$artifact/*" -DestinationPath "${artifact}.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "${artifact}.zip").Hash.ToLower()
          $hash | Out-File -NoNewline -Encoding ascii "${artifact}.zip.sha256"
          $size = (Get-Item "${artifact}.zip").Length
          $mb = [math]::Round($size / 1MB, 1)
          "${mb} MB" | Out-File -NoNewline -Encoding ascii "${artifact}.zip.size"
          "ARTIFACT=${artifact}.zip" | Out-File -Append $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ironclad-*.*
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ env.ARTIFACT }}

  provenance:
    name: Release Provenance Manifest
    needs: [preflight, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
      - name: Build provenance JSON
        run: |
          mkdir -p release-assets
          cp artifacts/binary-*/* release-assets/ || true
          scripts/generate-provenance.sh \
            --artifact-dir release-assets \
            --output release-assets/PROVENANCE.json
          jq -e '.artifacts | length > 0' release-assets/PROVENANCE.json >/dev/null
      - name: Upload provenance manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-provenance
          path: release-assets/PROVENANCE.json

  # ── Publish: crates.io in dependency order ─────────────
  publish:
    name: Publish Crates
    needs: [preflight, release-gates, uat-smoke, soak-fuzz, release-doc-gate, build, provenance]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Publish level 0
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          crate="ironclad-core"
          if curl -fsSL -H "User-Agent: ironclad-release/1.0" "https://crates.io/api/v1/crates/${crate}" \
            | jq -e --arg v "$VERSION" '.versions[] | select(.num == $v)' >/dev/null 2>&1; then
            echo "::notice::${crate} v${VERSION} already published, skipping"
          else
            cargo publish -p "${crate}" --locked || {
              err=$?; if [ $err -eq 101 ]; then
                echo "::notice::${crate} v${VERSION} already on index (race), skipping"
              else exit $err; fi
            }
          fi

      - name: Wait for crates.io index
        run: sleep 45

      - name: Publish level 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          publish_one() {
            local crate="$1"
            if curl -fsSL -H "User-Agent: ironclad-release/1.0" "https://crates.io/api/v1/crates/${crate}" \
              | jq -e --arg v "$VERSION" '.versions[] | select(.num == $v)' >/dev/null 2>&1; then
              echo "::notice::${crate} v${VERSION} already published, skipping"
            else
              echo "Publishing $crate..."
              cargo publish -p "$crate" --locked || {
                err=$?; if [ $err -eq 101 ]; then
                  echo "::notice::${crate} v${VERSION} already on index (race), skipping"
                else exit $err; fi
              }
            fi
          }

          pids=()
          for crate in ironclad-db ironclad-llm ironclad-plugin-sdk ironclad-browser ironclad-wallet; do
            (publish_one "$crate") &
            pids+=("$!")
          done
          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=1
          done
          [ "$failed" -eq 0 ]

      - name: Wait for crates.io index
        run: sleep 45

      - name: Publish level 2
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          publish_one() {
            local crate="$1"
            if curl -fsSL -H "User-Agent: ironclad-release/1.0" "https://crates.io/api/v1/crates/${crate}" \
              | jq -e --arg v "$VERSION" '.versions[] | select(.num == $v)' >/dev/null 2>&1; then
              echo "::notice::${crate} v${VERSION} already published, skipping"
            else
              echo "Publishing $crate..."
              cargo publish -p "$crate" --locked || {
                err=$?; if [ $err -eq 101 ]; then
                  echo "::notice::${crate} v${VERSION} already on index (race), skipping"
                else exit $err; fi
              }
            fi
          }

          pids=()
          for crate in ironclad-channels ironclad-agent; do
            (publish_one "$crate") &
            pids+=("$!")
          done
          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=1
          done
          [ "$failed" -eq 0 ]

      - name: Wait for crates.io index
        run: sleep 45

      - name: Publish level 3
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          crate="ironclad-schedule"
          if curl -fsSL -H "User-Agent: ironclad-release/1.0" "https://crates.io/api/v1/crates/${crate}" \
            | jq -e --arg v "$VERSION" '.versions[] | select(.num == $v)' >/dev/null 2>&1; then
            echo "::notice::${crate} v${VERSION} already published, skipping"
          else
            cargo publish -p "${crate}" --locked || {
              err=$?; if [ $err -eq 101 ]; then
                echo "::notice::${crate} v${VERSION} already on index (race), skipping"
              else exit $err; fi
            }
          fi

      - name: Wait for crates.io index
        run: sleep 45

      - name: Publish level 4
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          crate="ironclad-server"
          if curl -fsSL -H "User-Agent: ironclad-release/1.0" "https://crates.io/api/v1/crates/${crate}" \
            | jq -e --arg v "$VERSION" '.versions[] | select(.num == $v)' >/dev/null 2>&1; then
            echo "::notice::${crate} v${VERSION} already published, skipping"
          else
            cargo publish -p "${crate}" --locked || {
              err=$?; if [ $err -eq 101 ]; then
                echo "::notice::${crate} v${VERSION} already on index (race), skipping"
              else exit $err; fi
            }
          fi

  # ── Release: GitHub Release with binaries ──────────────
  release:
    name: Create GitHub Release
    needs: [preflight, release-gates, uat-smoke, soak-fuzz, release-doc-gate, build, provenance, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
      - name: Download provenance manifest
        uses: actions/download-artifact@v4
        with:
          path: artifacts/provenance
          name: release-provenance

      - name: Prepare release assets
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          mkdir -p release-assets

          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
            ! -name '*.sha256' ! -name '*.size' \
            -exec cp {} release-assets/ \;

          echo "# SHA256 checksums for Ironclad v${VERSION}" > release-assets/SHA256SUMS.txt
          for f in release-assets/*.tar.gz release-assets/*.zip; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            sha=$(shasum -a 256 "$f" | awk '{print $1}')
            echo "$sha  $base" >> release-assets/SHA256SUMS.txt
          done

          cat release-assets/SHA256SUMS.txt
          cp artifacts/provenance/PROVENANCE.json release-assets/PROVENANCE.json

      - name: Extract changelog section
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if ($0 ~ "\\[" ver "\\]") found=1; next }
            found { print }
          ' CHANGELOG.md > release-notes.md

          echo "::notice::Changelog extracted ($(wc -l < release-notes.md) lines)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "::notice::Release ${tag} already exists, updating"
            gh release edit "$tag" \
              --title "$tag" \
              --notes-file release-notes.md
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" \
              --title "$tag" \
              --notes-file release-notes.md \
              release-assets/*
          fi

  # ── Sync Site: dispatch to ironclad.ai ─────────────────
  sync-site:
    name: Sync Site
    needs: [preflight, release-gates, uat-smoke, soak-fuzz, release-doc-gate, build, provenance, release]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*

      - name: Build and send dispatch payload
        env:
          GH_TOKEN: ${{ secrets.SITE_DISPATCH_PAT }}
          VERSION: ${{ needs.preflight.outputs.version }}
          DATE: ${{ needs.preflight.outputs.date }}
        run: |
          # Build JSON object for each binary's sha256 + size
          binaries="{}"
          for sha_file in artifacts/binary-*/ironclad-*.sha256; do
            [ -f "$sha_file" ] || continue
            archive=$(basename "$sha_file" .sha256)
            sha=$(cat "$sha_file")
            size_file="${sha_file%.sha256}.size"
            size="unknown"
            [ -f "$size_file" ] && size=$(cat "$size_file")
            binaries=$(echo "$binaries" | jq \
              --arg k "$archive" \
              --arg s "$sha" \
              --arg sz "$size" \
              '. + {($k): {"sha256": $s, "size": $sz}}')
          done

          # Extract reference binary size (linux x86_64) for site metrics
          binary_size="unknown"
          ref_binsize="artifacts/binary-linux-x86_64/ironclad-${VERSION}-x86_64-linux.tar.gz.binsize"
          if [ -f "$ref_binsize" ]; then
            binary_size=$(cat "$ref_binsize")
          fi

          payload=$(jq -n \
            --arg version "$VERSION" \
            --arg date "$DATE" \
            --arg binary_size "$binary_size" \
            --argjson binaries "$binaries" \
            '{version: $version, date: $date, binary_size: $binary_size, binaries: $binaries}')

          echo "$payload" | jq .

          dispatch=$(jq -n \
            --arg event_type "release-sync" \
            --argjson client_payload "$payload" \
            '{event_type: $event_type, client_payload: $client_payload}')

          gh api repos/robot-accomplice/ironclad-site/dispatches \
            --method POST \
            --input <(echo "$dispatch")

