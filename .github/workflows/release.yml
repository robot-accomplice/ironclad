name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Preflight: validate tag matches workspace version ──
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      date: ${{ steps.meta.outputs.date }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate version
        id: meta
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          ws_ver=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')

          echo "Tag version:       $tag"
          echo "Workspace version: $ws_ver"

          if [ "$tag" != "$ws_ver" ]; then
            echo "::error::Tag v$tag does not match workspace version $ws_ver"
            exit 1
          fi

          if ! grep -q "## \[$tag\]" CHANGELOG.md; then
            echo "::error::No CHANGELOG.md entry for version $tag"
            exit 1
          fi

          echo "version=$tag" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

  # ── Verify: integration tests on release tags ───────────
  integration-tests:
    name: Integration Tests
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run integration API suite
        run: 'cargo test -p ironclad-tests server_api:: --locked'

  # ── Verify: regression battery on release tags ──────────
  regression-battery:
    name: Regression Battery
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install just
        run: cargo install just --locked
      - name: Run focused regression battery
        run: just test-regression

  # ── Verify: mandatory smoke + provenance preflight ──────
  release-gates:
    name: Release Gates
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install just
        run: cargo install just --locked
      - name: Release-critical battery
        run: just test-release-critical
      - name: Provenance generator self-test
        run: scripts/generate-provenance.sh --self-test

  # ── Verify: UAT smoke stack (CLI + Web) ─────────────────
  uat-smoke:
    name: UAT Smoke
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run UAT stack
        run: bash scripts/run-uat-stack.sh

  # ── Verify: bounded soak/fuzz ───────────────────────────
  soak-fuzz:
    name: Soak/Fuzz
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install nightly toolchain for fuzzing
        run: rustup toolchain install nightly --profile minimal
      - name: Install just and cargo-fuzz
        run: cargo install just cargo-fuzz --locked
      - name: Run soak/fuzz battery
        env:
          SOAK_ROUNDS: "4"
          FUZZ_SECONDS: "45"
        run: just test-soak-fuzz

  # ── Verify: docs/release artifact consistency ───────────
  release-doc-gate:
    name: Release Docs Gate
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install just
        run: cargo install just --locked
      - name: Run release doc gate
        env:
          RELEASE_TARGET_VERSION: ${{ needs.preflight.outputs.version }}
        run: just test-release-doc-gate

  # ── Build: cross-platform binary matrix ────────────────
  build:
    name: "Build (${{ matrix.target }})"
    needs: [preflight, integration-tests, regression-battery, release-gates, uat-smoke, soak-fuzz, release-doc-gate]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: x86_64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            arch: aarch64
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-14
            os: darwin
            arch: x86_64
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-14
            os: darwin
            arch: aarch64
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            arch: x86_64
            use_cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build release binary
        env:
          TARGET: ${{ matrix.target }}
          USE_CROSS: ${{ matrix.use_cross }}
        run: |
          if [ "$USE_CROSS" = "true" ]; then
            cross build --release --locked --bin ironclad --target "$TARGET"
          else
            cargo build --release --locked --bin ironclad --target "$TARGET"
          fi
        shell: bash

      - name: Package artifact (unix)
        if: matrix.os != 'windows'
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TARGET: ${{ matrix.target }}
          ARCH: ${{ matrix.arch }}
          OS: ${{ matrix.os }}
        run: |
          artifact="ironclad-${VERSION}-${ARCH}-${OS}"
          mkdir -p "$artifact"
          cp "target/${TARGET}/release/ironclad" "$artifact/"
          tar czf "${artifact}.tar.gz" "$artifact"
          shasum -a 256 "${artifact}.tar.gz" | awk '{print $1}' > "${artifact}.tar.gz.sha256"
          size=$(ls -l "${artifact}.tar.gz" | awk '{print $5}')
          mb=$(echo "scale=1; $size / 1048576" | bc)
          echo "${mb} MB" > "${artifact}.tar.gz.size"
          echo "ARTIFACT=${artifact}.tar.gz" >> "$GITHUB_ENV"

      - name: Package artifact (windows)
        if: matrix.os == 'windows'
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          ARCH: ${{ matrix.arch }}
          OS: ${{ matrix.os }}
          TARGET: ${{ matrix.target }}
        shell: pwsh
        run: |
          $artifact = "ironclad-${env:VERSION}-${env:ARCH}-${env:OS}"
          New-Item -ItemType Directory -Path $artifact | Out-Null
          Copy-Item "target/${env:TARGET}/release/ironclad.exe" "$artifact/"
          Compress-Archive -Path "$artifact/*" -DestinationPath "${artifact}.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "${artifact}.zip").Hash.ToLower()
          $hash | Out-File -NoNewline -Encoding ascii "${artifact}.zip.sha256"
          $size = (Get-Item "${artifact}.zip").Length
          $mb = [math]::Round($size / 1MB, 1)
          "${mb} MB" | Out-File -NoNewline -Encoding ascii "${artifact}.zip.size"
          "ARTIFACT=${artifact}.zip" | Out-File -Append $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ironclad-*.*
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ env.ARTIFACT }}

  provenance:
    name: Release Provenance Manifest
    needs: [preflight, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
      - name: Build provenance JSON
        run: |
          mkdir -p release-assets
          cp artifacts/binary-*/* release-assets/ || true
          scripts/generate-provenance.sh \
            --artifact-dir release-assets \
            --output release-assets/PROVENANCE.json
          jq -e '.artifacts | length > 0' release-assets/PROVENANCE.json >/dev/null
      - name: Upload provenance manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-provenance
          path: release-assets/PROVENANCE.json

  # ── Publish: crates.io in dependency order ─────────────
  publish:
    name: Publish Crates
    needs: [preflight, integration-tests, regression-battery, release-gates, uat-smoke, soak-fuzz, release-doc-gate, build, provenance]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Publish level 0
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          crate="ironclad-core"
          if curl -fsSL "https://crates.io/api/v1/crates/${crate}" | jq -e --arg v "$VERSION" '.versions[] | select(.num == $v)' >/dev/null; then
            echo "::notice::${crate} v${VERSION} already published, skipping"
          else
            cargo publish -p "${crate}" --locked
          fi

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish level 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          for crate in ironclad-db ironclad-llm ironclad-channels ironclad-browser ironclad-plugin-sdk; do
            if curl -fsSL "https://crates.io/api/v1/crates/${crate}" | jq -e --arg v "$VERSION" '.versions[] | select(.num == $v)' >/dev/null; then
              echo "::notice::${crate} v${VERSION} already published, skipping"
            else
              echo "Publishing $crate..."
              cargo publish -p "$crate" --locked
              sleep 10
            fi
          done

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish level 2
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          for crate in ironclad-agent ironclad-wallet; do
            if curl -fsSL "https://crates.io/api/v1/crates/${crate}" | jq -e --arg v "$VERSION" '.versions[] | select(.num == $v)' >/dev/null; then
              echo "::notice::${crate} v${VERSION} already published, skipping"
            else
              echo "Publishing $crate..."
              cargo publish -p "$crate" --locked
              sleep 10
            fi
          done

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish level 3
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          crate="ironclad-schedule"
          if curl -fsSL "https://crates.io/api/v1/crates/${crate}" | jq -e --arg v "$VERSION" '.versions[] | select(.num == $v)' >/dev/null; then
            echo "::notice::${crate} v${VERSION} already published, skipping"
          else
            cargo publish -p "${crate}" --locked
          fi

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish level 4
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          crate="ironclad-server"
          if curl -fsSL "https://crates.io/api/v1/crates/${crate}" | jq -e --arg v "$VERSION" '.versions[] | select(.num == $v)' >/dev/null; then
            echo "::notice::${crate} v${VERSION} already published, skipping"
          else
            cargo publish -p "${crate}" --locked
          fi

  # ── Release: GitHub Release with binaries ──────────────
  release:
    name: Create GitHub Release
    needs: [preflight, integration-tests, regression-battery, release-gates, uat-smoke, soak-fuzz, release-doc-gate, build, provenance, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
      - name: Download provenance manifest
        uses: actions/download-artifact@v4
        with:
          path: artifacts/provenance
          name: release-provenance

      - name: Prepare release assets
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          mkdir -p release-assets

          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
            ! -name '*.sha256' ! -name '*.size' \
            -exec cp {} release-assets/ \;

          echo "# SHA256 checksums for Ironclad v${VERSION}" > release-assets/SHA256SUMS.txt
          for f in release-assets/*.tar.gz release-assets/*.zip; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            sha=$(shasum -a 256 "$f" | awk '{print $1}')
            echo "$sha  $base" >> release-assets/SHA256SUMS.txt
          done

          cat release-assets/SHA256SUMS.txt
          cp artifacts/provenance/PROVENANCE.json release-assets/PROVENANCE.json

      - name: Extract changelog section
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if ($0 ~ "\\[" ver "\\]") found=1; next }
            found { print }
          ' CHANGELOG.md > release-notes.md

          echo "::notice::Changelog extracted ($(wc -l < release-notes.md) lines)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "::notice::Release ${tag} already exists, updating"
            gh release edit "$tag" \
              --title "$tag" \
              --notes-file release-notes.md
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" \
              --title "$tag" \
              --notes-file release-notes.md \
              release-assets/*
          fi

  # ── Sync Site: dispatch to ironclad.ai ─────────────────
  sync-site:
    name: Sync Site
    needs: [preflight, integration-tests, regression-battery, release-gates, uat-smoke, soak-fuzz, release-doc-gate, build, provenance, release]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*

      - name: Build and send dispatch payload
        env:
          GH_TOKEN: ${{ secrets.SITE_DISPATCH_PAT }}
          VERSION: ${{ needs.preflight.outputs.version }}
          DATE: ${{ needs.preflight.outputs.date }}
        run: |
          # Build JSON object for each binary's sha256 + size
          binaries="{}"
          for sha_file in artifacts/binary-*/ironclad-*.sha256; do
            [ -f "$sha_file" ] || continue
            archive=$(basename "$sha_file" .sha256)
            sha=$(cat "$sha_file")
            size_file="${sha_file%.sha256}.size"
            size="unknown"
            [ -f "$size_file" ] && size=$(cat "$size_file")
            binaries=$(echo "$binaries" | jq \
              --arg k "$archive" \
              --arg s "$sha" \
              --arg sz "$size" \
              '. + {($k): {"sha256": $s, "size": $sz}}')
          done

          payload=$(jq -n \
            --arg version "$VERSION" \
            --arg date "$DATE" \
            --argjson binaries "$binaries" \
            '{version: $version, date: $date, binaries: $binaries}')

          echo "$payload" | jq .

          dispatch=$(jq -n \
            --arg event_type "release-sync" \
            --argjson client_payload "$payload" \
            '{event_type: $event_type, client_payload: $client_payload}')

          gh api repos/robot-accomplice/ironclad-site/dispatches \
            --method POST \
            --input <(echo "$dispatch")

  # ── Publish: Homebrew tap formula ──────────────────────
  update-homebrew:
    name: Update Homebrew Tap
    needs: [preflight, release]
    runs-on: ubuntu-latest
    steps:
      - name: Download SHA256SUMS from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          gh release download "v${VERSION}" \
            --repo robot-accomplice/ironclad \
            --pattern "SHA256SUMS.txt" \
            --dir .

      - name: Extract checksums
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          extract_sha() {
            grep "$1" SHA256SUMS.txt | awk '{print $1}'
          }
          {
            echo "SHA_X86_64_DARWIN=$(extract_sha "ironclad-${VERSION}-x86_64-darwin.tar.gz")"
            echo "SHA_AARCH64_DARWIN=$(extract_sha "ironclad-${VERSION}-aarch64-darwin.tar.gz")"
            echo "SHA_X86_64_LINUX=$(extract_sha "ironclad-${VERSION}-x86_64-linux.tar.gz")"
            echo "SHA_AARCH64_LINUX=$(extract_sha "ironclad-${VERSION}-aarch64-linux.tar.gz")"
          } >> "$GITHUB_ENV"

      - name: Checkout homebrew-ironclad tap
        uses: actions/checkout@v4
        with:
          repository: robot-accomplice/homebrew-ironclad
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          cat > homebrew-tap/Formula/ironclad.rb << 'STATIC_EOF'
          # typed: false
          # frozen_string_literal: true

          class Ironclad < Formula
            desc "Autonomous agent runtime — single binary, streaming LLM, semantic caching, zero-trust A2A"
            homepage "https://roboticus.ai"
            license "Apache-2.0"
          STATIC_EOF

          cat >> homebrew-tap/Formula/ironclad.rb << EOF
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/robot-accomplice/ironclad/releases/download/v${VERSION}/ironclad-${VERSION}-aarch64-darwin.tar.gz"
                sha256 "${SHA_AARCH64_DARWIN}"
              else
                url "https://github.com/robot-accomplice/ironclad/releases/download/v${VERSION}/ironclad-${VERSION}-x86_64-darwin.tar.gz"
                sha256 "${SHA_X86_64_DARWIN}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/robot-accomplice/ironclad/releases/download/v${VERSION}/ironclad-${VERSION}-aarch64-linux.tar.gz"
                sha256 "${SHA_AARCH64_LINUX}"
              else
                url "https://github.com/robot-accomplice/ironclad/releases/download/v${VERSION}/ironclad-${VERSION}-x86_64-linux.tar.gz"
                sha256 "${SHA_X86_64_LINUX}"
              end
            end

            def install
              bin.install "ironclad"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/ironclad version")
            end
          end
          EOF

      - name: Commit and push formula
        working-directory: homebrew-tap
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ironclad.rb
          git diff --cached --quiet && echo "Formula unchanged" && exit 0
          git commit -m "ironclad ${VERSION}"
          git push

  # ── Publish: Winget manifest ───────────────────────────
  update-winget:
    name: Update Winget Manifest
    needs: [preflight, release]
    runs-on: ubuntu-latest
    steps:
      - name: Submit to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: RobotAccomplice.Ironclad
          version: ${{ needs.preflight.outputs.version }}
          installers-regex: '\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
          max-versions-to-keep: 5

  # ── Notify: release completion notification ───────────
  notify:
    name: Release Notification
    needs: [preflight, build, publish, release, sync-site, update-homebrew, update-winget]
    if: always()
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      DATE: ${{ needs.preflight.outputs.date }}
    steps:
      - name: Determine release status
        id: status
        run: |
          if [ "${{ needs.publish.result }}" = "success" ] && \
             [ "${{ needs.release.result }}" = "success" ] && \
             [ "${{ needs.sync-site.result }}" = "success" ] && \
             [ "${{ needs.update-homebrew.result }}" = "success" ] && \
             [ "${{ needs.update-winget.result }}" = "success" ]; then
            echo "outcome=success" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
            echo "summary=All release stages completed successfully." >> "$GITHUB_OUTPUT"
          else
            echo "outcome=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
            echo "summary=One or more release stages failed. Check the workflow run for details." >> "$GITHUB_OUTPUT"
          fi

      - name: Send email notification
        if: env.SMTP_SERVER != ''
        uses: dawidd6/action-send-mail@v3
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || 587 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "${{ steps.status.outputs.emoji }} Ironclad v${{ env.VERSION }} release ${{ steps.status.outputs.outcome }}"
          to: ${{ secrets.RELEASE_NOTIFY_EMAIL }}
          from: "Ironclad CI <ci@roboticus.ai>"
          content_type: text/html
          body: |
            <h2>${{ steps.status.outputs.emoji }} Ironclad v${{ env.VERSION }} — Release ${{ steps.status.outputs.outcome }}</h2>
            <p>${{ steps.status.outputs.summary }}</p>
            <table>
              <tr><td><strong>Version</strong></td><td>v${{ env.VERSION }}</td></tr>
              <tr><td><strong>Date</strong></td><td>${{ env.DATE }}</td></tr>
              <tr><td><strong>Crates.io</strong></td><td>${{ needs.publish.result }}</td></tr>
              <tr><td><strong>GitHub Release</strong></td><td>${{ needs.release.result }}</td></tr>
              <tr><td><strong>Site Sync</strong></td><td>${{ needs.sync-site.result }}</td></tr>
              <tr><td><strong>Homebrew Tap</strong></td><td>${{ needs.update-homebrew.result }}</td></tr>
              <tr><td><strong>Winget Manifest</strong></td><td>${{ needs.update-winget.result }}</td></tr>
              <tr><td><strong>Build Matrix</strong></td><td>${{ needs.build.result }}</td></tr>
            </table>
            <p>
              <a href="https://github.com/robot-accomplice/ironclad/releases/tag/v${{ env.VERSION }}">View Release</a> |
              <a href="https://github.com/robot-accomplice/ironclad/actions/runs/${{ github.run_id }}">View Workflow Run</a>
            </p>

      - name: Send Discord notification
        if: env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
        run: |
          status="${{ steps.status.outputs.outcome }}"
          emoji="${{ steps.status.outputs.emoji }}"
          color=$( [ "$status" = "success" ] && echo "3066993" || echo "15158332" )

          payload=$(jq -n \
            --arg title "${emoji} Ironclad v${VERSION} release ${status}" \
            --arg desc "${{ steps.status.outputs.summary }}" \
            --argjson color "$color" \
            --arg url "https://github.com/robot-accomplice/ironclad/releases/tag/v${VERSION}" \
            --arg run_url "https://github.com/robot-accomplice/ironclad/actions/runs/${{ github.run_id }}" \
            --arg publish "${{ needs.publish.result }}" \
            --arg gh_release "${{ needs.release.result }}" \
            --arg site "${{ needs.sync-site.result }}" \
            --arg homebrew "${{ needs.update-homebrew.result }}" \
            --arg winget "${{ needs.update-winget.result }}" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: $color,
                url: $url,
                fields: [
                  { name: "Crates.io", value: $publish, inline: true },
                  { name: "GitHub Release", value: $gh_release, inline: true },
                  { name: "Site Sync", value: $site, inline: true },
                  { name: "Homebrew", value: $homebrew, inline: true },
                  { name: "Winget", value: $winget, inline: true }
                ],
                footer: { text: "Workflow run" },
                timestamp: (now | todate)
              }]
            }')

          curl -fsSL -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK"

      - name: Post workflow summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ${{ steps.status.outputs.emoji }} Release v${VERSION} — ${{ steps.status.outputs.outcome }}

          | Stage | Result |
          |-------|--------|
          | Crates.io Publish | ${{ needs.publish.result }} |
          | GitHub Release | ${{ needs.release.result }} |
          | Site Sync | ${{ needs.sync-site.result }} |
          | Homebrew Tap | ${{ needs.update-homebrew.result }} |
          | Winget Manifest | ${{ needs.update-winget.result }} |
          | Build Matrix | ${{ needs.build.result }} |

          **Links:**
          - [Release](https://github.com/robot-accomplice/ironclad/releases/tag/v${VERSION})
          - [Workflow Run](https://github.com/robot-accomplice/ironclad/actions/runs/${{ github.run_id }})
          EOF
