  # ── Notify: release completion notification ───────────
  notify:
    name: Release Notification
    needs: [preflight, build, publish, release, sync-site] #, update-homebrew, update-winget]
    if: always()
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      DATE: ${{ needs.preflight.outputs.date }}
    steps:
      - name: Determine release status
        id: status
        run: |
          if [ "${{ needs.publish.result }}" = "success" ] && \
             [ "${{ needs.release.result }}" = "success" ] && \
             [ "${{ needs.sync-site.result }}" = "success" ] && \
             [ "${{ needs.update-homebrew.result }}" = "success" ] && \
             [ "${{ needs.update-winget.result }}" = "success" ]; then
            echo "outcome=success" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
            echo "summary=All release stages completed successfully." >> "$GITHUB_OUTPUT"
          else
            echo "outcome=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
            echo "summary=One or more release stages failed. Check the workflow run for details." >> "$GITHUB_OUTPUT"
          fi

      - name: Verify crates.io availability
        id: verify-crates
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          for attempt in 1 2 3 4 5; do
            if curl -fsSL -H "User-Agent: ironclad-release/1.0" "https://crates.io/api/v1/crates/ironclad-server" \
              | jq -e --arg v "$VERSION" '.versions[] | select(.num == $v)' > /dev/null 2>&1; then
              echo "crates_live=true" >> "$GITHUB_OUTPUT"
              echo "Verified: ironclad-server v${VERSION} is live on crates.io"
              exit 0
            fi
            echo "Attempt $attempt: v${VERSION} not yet visible, waiting 30s..."
            sleep 30
          done
          echo "crates_live=false" >> "$GITHUB_OUTPUT"
          echo "WARNING: v${VERSION} not confirmed on crates.io after 5 attempts"

      - name: Send email notification
        if: env.SMTP_SERVER != ''
        uses: dawidd6/action-send-mail@v3
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || 587 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "${{ steps.status.outputs.emoji }} Ironclad v${{ env.VERSION }} release ${{ steps.status.outputs.outcome }}"
          to: ${{ secrets.RELEASE_NOTIFY_EMAIL }}
          from: ${{ secrets.RELEASE_FROM_EMAIL || 'Ironclad CI <ci@roboticus.ai>' }}
          html_body: |
            <!DOCTYPE html>
            <html>
            <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color: #24292f; max-width: 600px; margin: 0 auto; padding: 20px;">
              <h2 style="margin: 0 0 8px 0; font-size: 20px;">${{ steps.status.outputs.emoji }} Ironclad v${{ env.VERSION }} — Release ${{ steps.status.outputs.outcome }}</h2>
              <p style="color: #57606a; margin: 0 0 16px 0;">${{ steps.status.outputs.summary }}</p>
              <table style="border-collapse: collapse; width: 100%; font-size: 14px;">
                <tr><td style="padding: 8px 12px; border: 1px solid #d0d7de;"><strong>Version</strong></td><td style="padding: 8px 12px; border: 1px solid #d0d7de;">v${{ env.VERSION }}</td></tr>
                <tr style="background: #f6f8fa;"><td style="padding: 8px 12px; border: 1px solid #d0d7de;"><strong>Date</strong></td><td style="padding: 8px 12px; border: 1px solid #d0d7de;">${{ env.DATE }}</td></tr>
                <tr><td style="padding: 8px 12px; border: 1px solid #d0d7de;"><strong>Crates.io Publish</strong></td><td style="padding: 8px 12px; border: 1px solid #d0d7de;">${{ needs.publish.result }}</td></tr>
                <tr style="background: #f6f8fa;"><td style="padding: 8px 12px; border: 1px solid #d0d7de;"><strong>Crates.io Live</strong></td><td style="padding: 8px 12px; border: 1px solid #d0d7de;">${{ steps.verify-crates.outputs.crates_live == 'true' && '✅ Verified' || '⚠️ Not confirmed' }}</td></tr>
                <tr><td style="padding: 8px 12px; border: 1px solid #d0d7de;"><strong>GitHub Release</strong></td><td style="padding: 8px 12px; border: 1px solid #d0d7de;">${{ needs.release.result }}</td></tr>
                <tr style="background: #f6f8fa;"><td style="padding: 8px 12px; border: 1px solid #d0d7de;"><strong>Site Sync</strong></td><td style="padding: 8px 12px; border: 1px solid #d0d7de;">${{ needs.sync-site.result }}</td></tr>
                <tr><td style="padding: 8px 12px; border: 1px solid #d0d7de;"><strong>Build Matrix</strong></td><td style="padding: 8px 12px; border: 1px solid #d0d7de;">${{ needs.build.result }}</td></tr>
              </table>
              <p style="margin: 16px 0 0 0; font-size: 14px;">
                <a href="https://github.com/robot-accomplice/ironclad/releases/tag/v${{ env.VERSION }}" style="color: #0969da; text-decoration: none;">View Release</a> &middot;
                <a href="https://github.com/robot-accomplice/ironclad/actions/runs/${{ github.run_id }}" style="color: #0969da; text-decoration: none;">View Workflow Run</a>
              </p>
            </body>
            </html>

      - name: Send Discord notification
        if: env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
        run: |
          status="${{ steps.status.outputs.outcome }}"
          emoji="${{ steps.status.outputs.emoji }}"
          color=$( [ "$status" = "success" ] && echo "3066993" || echo "15158332" )

          payload=$(jq -n \
            --arg title "${emoji} Ironclad v${VERSION} release ${status}" \
            --arg desc "${{ steps.status.outputs.summary }}" \
            --argjson color "$color" \
            --arg url "https://github.com/robot-accomplice/ironclad/releases/tag/v${VERSION}" \
            --arg run_url "https://github.com/robot-accomplice/ironclad/actions/runs/${{ github.run_id }}" \
            --arg publish "${{ needs.publish.result }}" \
            --arg gh_release "${{ needs.release.result }}" \
            --arg site "${{ needs.sync-site.result }}" \
            --arg homebrew "${{ needs.update-homebrew.result }}" \
            --arg winget "${{ needs.update-winget.result }}" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: $color,
                url: $url,
                fields: [
                  { name: "Crates.io", value: $publish, inline: true },
                  { name: "GitHub Release", value: $gh_release, inline: true },
                  { name: "Site Sync", value: $site, inline: true },
                  { name: "Homebrew", value: $homebrew, inline: true },
                  { name: "Winget", value: $winget, inline: true }
                ],
                footer: { text: "Workflow run" },
                timestamp: (now | todate)
              }]
            }')

          curl -fsSL -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK"

      - name: Post workflow summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ${{ steps.status.outputs.emoji }} Release v${VERSION} — ${{ steps.status.outputs.outcome }}

          | Stage | Result |
          |-------|--------|
          | Crates.io Publish | ${{ needs.publish.result }} |
          | GitHub Release | ${{ needs.release.result }} |
          | Site Sync | ${{ needs.sync-site.result }} |
          | Homebrew Tap | ${{ needs.update-homebrew.result }} |
          | Winget Manifest | ${{ needs.update-winget.result }} |
          | Build Matrix | ${{ needs.build.result }} |

          **Links:**
          - [Release](https://github.com/robot-accomplice/ironclad/releases/tag/v${VERSION})
          - [Workflow Run](https://github.com/robot-accomplice/ironclad/actions/runs/${{ github.run_id }})
          EOF
